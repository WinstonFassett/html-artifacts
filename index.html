<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Artifact Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

    header { padding: 2rem; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #fff; }
    header span { color: #555; font-size: 0.875rem; }

    .controls { padding: 1rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #181818; }
    .search { flex: 1; min-width: 200px; background: #111; border: 1px solid #222; color: #e0e0e0; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem; outline: none; }
    .search:focus { border-color: #444; }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .coll-group { display: flex; gap: 0; margin-right: 0.5rem; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
    .coll-btn { padding: 0.375rem 0.85rem; border: none; background: transparent; color: #999; cursor: pointer; font-size: 0.78rem; font-weight: 500; transition: all 0.15s; }
    .coll-btn:not(:last-child) { border-right: 1px solid #333; }
    .coll-btn:hover { background: #1a1a1a; color: #ccc; }
    .coll-btn.active { background: #2a4a35; color: #6ee7a0; }
    .filter-btn { padding: 0.375rem 0.75rem; border-radius: 99px; border: 1px solid #222; background: transparent; color: #888; cursor: pointer; font-size: 0.75rem; transition: all 0.15s; }
    .filter-btn:hover { border-color: #444; color: #ccc; }
    .filter-btn.active { background: #222; border-color: #555; color: #fff; }
    .count { color: #555; font-size: 0.8rem; margin-left: auto; }

    main { padding: 1.5rem 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

    .card { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .card:hover { border-color: #333; transform: translateY(-1px); }
    .card.hidden { display: none; }

    .preview-wrap { position: relative; height: 200px; overflow: hidden; background: #15151a; }
    /* Static screenshot thumbnail (previews/<slug>.png). Replaced the live
       iframe previews — with ~165 cards, iframes tanked scroll perf even lazy. */
    .preview { width: 100%; height: 100%; border: none; display: block;
               object-fit: cover; object-position: top center; background: #15151a; }
    .preview.missing { display: flex; align-items: center; justify-content: center;
               color: #555; font-size: 0.7rem; letter-spacing: 0.04em; }
    .preview-overlay { position: absolute; inset: 0; cursor: pointer; }
    .card-body { padding: 0.75rem 1rem; }
    .card-name { font-size: 0.85rem; font-weight: 500; color: #d0d0d0; }
    .card-tag { display: inline-block; margin-top: 0.35rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; background: #1a1a1a; color: #666; border: 1px solid #222; }
    .card-source { font-size: 0.7rem; color: #444; margin-top: 0.25rem; }
    .badge-esm { position: absolute; top: 6px; right: 6px; z-index: 2; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.03em; background: rgba(180, 120, 30, 0.85); color: #fff; }
    .badge-script { position: absolute; top: 6px; right: 6px; z-index: 2; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.03em; background: rgba(40, 120, 60, 0.85); color: #fff; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; }
    #lightbox.open { display: flex; }
    #lb-header { padding: 0.75rem 1rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #222; flex-shrink: 0; }
    #lb-title { font-size: 0.9rem; color: #ccc; flex: 1; }
    #lb-open { color: #888; font-size: 0.8rem; text-decoration: none; border: 1px solid #333; padding: 0.3rem 0.6rem; border-radius: 4px; }
    #lb-open:hover { color: #fff; border-color: #555; }
    #lb-close { background: none; border: none; color: #666; font-size: 1.5rem; cursor: pointer; padding: 0 0.25rem; }
    #lb-close:hover { color: #fff; }
    #lb-frame { flex: 1; border: none; width: 100%; background: #fff; }
  </style>
</head>

<header>

const ALL_TAGS = [...new Set(artifacts.flatMap(a => a.tags))].sort();
const ALL_SOURCES = [...new Set(artifacts.map(a => a.source))].sort();

// html-anything = the 87 mostly-static document/article templates. Hidden by default.
const STATIC_SOURCE = 'html-anything';

let activeTag = null;
let activeSource = null;
let collection = 'interactive';  // 'interactive' (default) | 'templates' | 'all'
let query = '';

function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-'); }

function buildFilters() {
  const f = document.getElementById('filters');

  // Collection toggle (primary): Interactive / Templates / All
  const collGroup = document.createElement('div');
  collGroup.className = 'coll-group';
  const collDefs = [
    ['interactive', 'Interactive'],
    ['templates', 'Templates'],
    ['all', 'All'],
  ];
  collDefs.forEach(([val, label]) => {
    const b = document.createElement('button');
    b.className = 'coll-btn' + (val === collection ? ' active' : '');
    b.textContent = label;
    b.onclick = () => {
      collection = val; activeTag = null; activeSource = null;
      document.querySelectorAll('.coll-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x.dataset.type === 'all'));
      filter();
    };
    collGroup.appendChild(b);
  });
  f.appendChild(collGroup);

  // Tag filters (within the current collection)
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'all tags';
  all.dataset.type = 'all';
  all.onclick = () => { activeTag = null; activeSource = null; setActive(all); filter(); };
  f.appendChild(all);

  ALL_SOURCES.filter(s => s !== STATIC_SOURCE).forEach(src => {
    const b = document.createElement('button');
    b.className = 'filter-btn';
    b.textContent = src;
    b.dataset.type = 'source';
    b.dataset.val = src;
    b.onclick = () => { activeSource = src; activeTag = null; setActive(b); filter(); };
    f.appendChild(b);
  });

  ALL_TAGS.forEach(tag => {
    const b = document.createElement('button');
    b.className = 'filter-btn';
    b.textContent = tag;
    b.dataset.type = 'tag';
    b.dataset.val = tag;
    b.onclick = () => { activeTag = tag; activeSource = null; setActive(b); filter(); };
    f.appendChild(b);
  });
}

function setActive(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function inCollection(source) {
  if (collection === 'all') return true;
  if (collection === 'templates') return source === STATIC_SOURCE;
  return source !== STATIC_SOURCE; // interactive
}

function filter() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const name = card.dataset.name;
    const tags = card.dataset.tags.split(',');
    const source = card.dataset.source;
    const matchColl = inCollection(source);
    const matchQ = !query || name.includes(query) || tags.some(t => t.includes(query)) || source.includes(query);
    const matchTag = !activeTag || tags.includes(activeTag);
    const matchSrc = !activeSource || source === activeSource;
    const show = matchColl && matchQ && matchTag && matchSrc;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('count').textContent = `${visible} artifacts`;
}

function openLightbox(artifact) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-title').textContent = artifact.name;
  document.getElementById('lb-open').href = artifact.path;
  document.getElementById('lb-frame').src = artifact.path;
  lb.classList.add('open');
}

// Map an artifact path -> its screenshot thumbnail filename. MUST match the
// slug_path() in tools/shoot.py that generated previews/<slug>.png.
function slugPath(p) { return p.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''); }

function buildGrid() {
  const grid = document.getElementById('grid');
  artifacts.forEach(a => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.name = a.name;
    card.dataset.tags = a.tags.join(',');
    card.dataset.source = a.source;

    const wrap = document.createElement('div');
    wrap.className = 'preview-wrap';

    // Static screenshot thumbnail. img[loading=lazy] is native + cheap;
    // the live iframe now lives only in the click-to-run lightbox.
    const img = document.createElement('img');
    img.className = 'preview';
    img.loading = 'lazy';
    img.decoding = 'async';
    img.alt = a.name;
    img.src = `previews/${slugPath(a.path)}.png`;
    img.addEventListener('error', () => {
      img.classList.add('missing');
      img.removeAttribute('src');
      img.textContent = 'no preview';
    });

    const overlay = document.createElement('div');
    overlay.className = 'preview-overlay';
    overlay.addEventListener('click', () => openLightbox(a));

    if (a.loading) {
      const badge = document.createElement('span');
      badge.className = a.loading === 'esm' ? 'badge-esm' : 'badge-script';
      badge.textContent = a.loading === 'esm' ? 'ESM·http' : 'file://';
      badge.title = a.loading === 'esm' ? 'Uses ES module imports — needs HTTP server (breaks from file://)' : 'Plain script tags — runs from file:// directly';
      wrap.appendChild(badge);
    }

    wrap.appendChild(img);
    wrap.appendChild(overlay);

    const body = document.createElement('div');
    body.className = 'card-body';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = a.name;

    const tagEl = document.createElement('span');
    tagEl.className = 'card-tag';
    tagEl.textContent = a.tags[0];

    const srcEl = document.createElement('div');
    srcEl.className = 'card-source';
    srcEl.textContent = a.source;

    body.appendChild(nameEl);
    body.appendChild(tagEl);
    body.appendChild(srcEl);
    card.appendChild(wrap);
    card.appendChild(body);

    grid.appendChild(card);
  });
  document.getElementById('count').textContent = `${artifacts.length} artifacts`;
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  filter();
});

document.getElementById('lb-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-frame').src = '';
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lb-frame').src = '';
  }
});

buildFilters();
buildGrid();
filter();  // apply default collection (interactive) on load
</script>
