name: '@fireproof/core-publish'
on:
  push:
    tags:
      - 'pkg@*'

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  ci_core_publish:
    name: CI Vibes.Diy Publish Packages
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    environment: ${{ startsWith(github.ref, 'refs/tags/pkg@s') && 'staging' || startsWith(github.ref, 'refs/tags/pkg@p') && 'production' || 'dev' }}

    steps:
      - uses: actions/checkout@v5

      - uses: ./actions/base

      - uses: ./actions/core-publish
