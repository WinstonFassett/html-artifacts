name: Deploy Failback Homepage

on:
  # Production deployment on main only
  push:
    paths:
      - 'vibes.diy/failback-homepage/**/*'
    branches:
      - main

  # Manual trigger for controlled deployments
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup runtime environment
        uses: ./actions/runtime

      - name: Install failback-homepage dependencies
        run: |
          cd vibes.diy/failback-homepage
          pnpm install

      - name: Build failback-homepage
        run: |
          cd vibes.diy/failback-homepage
          pnpm build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd vibes.diy/failback-homepage

          # Determine project name based on environment
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            PROJECT_NAME="failback-homepage"
            echo "🚀 Deploying to production..."
          else
            PROJECT_NAME="failback-homepage-preview"
            echo "🚀 Deploying to preview..."
          fi

          # Deploy to Cloudflare Pages
          for attempt in 1 2 3; do
            npx wrangler pages deploy dist --project-name=${PROJECT_NAME} && break
            if [ "$attempt" -eq 3 ]; then echo "wrangler pages deploy failed after 3 attempts"; exit 1; fi
            echo "wrangler pages deploy attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

          echo "✅ Deployment complete!"
          echo "🌐 Site URL: https://${PROJECT_NAME}.pages.dev"

      - name: Deployment summary
        run: |
          echo ""
          echo "🎉 Failback Homepage Deployment Summary"
          echo "========================================"
          echo "✅ Build completed successfully"
          echo "✅ Deployed to Cloudflare Pages"
          echo ""
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "🌐 Production URL: https://failback-homepage.pages.dev"
          else
            echo "🌐 Preview URL: https://failback-homepage-preview.pages.dev"
          fi
          echo ""
