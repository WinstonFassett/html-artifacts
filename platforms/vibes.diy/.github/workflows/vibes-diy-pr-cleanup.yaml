name: 'Cleanup vibes.diy PR Preview'

on:
  pull_request:
    types: [closed]
    paths:
      - 'vibes.diy/**/*'
      - '.github/workflows/vibes-diy-pr-preview.yaml'

jobs:
  cleanup-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node and pnpm
        uses: ./actions/runtime

      - name: Install wrangler
        run: pnpm add -g wrangler@4.80.0

      - name: Set PR info
        id: pr
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          WORKER_NAME="pr-${PR_NUMBER}-vibes-diy-v2"
          PREVIEW_HOST="pr-${PR_NUMBER}.vibespreview.dev"
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "worker_name=${WORKER_NAME}" >> $GITHUB_OUTPUT
          echo "preview_host=${PREVIEW_HOST}" >> $GITHUB_OUTPUT

      - name: Delete preview worker
        id: delete
        run: |
          set -e
          OUTPUT=$(wrangler delete ${{ steps.pr.outputs.worker_name }} --force 2>&1) && STATUS="deleted" || {
            if echo "$OUTPUT" | grep -qi "not found"; then
              STATUS="not_found"
            else
              echo "::error::Failed to delete worker: $OUTPUT"
              exit 1
            fi
          }
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete preview DNS + TLS
        # wrangler delete already removed the worker's routes; here we tear
        # down the per-PR DNS records and the ACM advanced cert pack so a
        # closed PR doesn't keep holding a zone cert slot. Tolerate "not
        # found" for never-deployed PRs and re-runs. Uses the dedicated
        # zone-ops token (vibespreview.dev DNS:Edit + SSL:Edit), not the
        # wrangler token — same split as vibes-diy-pr-preview.yaml.
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_VIBESPREVIEW_API_TOKEN }}
          CF_ZONE_ID: ${{ vars.CLOUDFLARE_VIBESPREVIEW_ZONE_ID }}
          PREVIEW_HOST: ${{ steps.pr.outputs.preview_host }}
        run: |
          set -euo pipefail
          if [ -z "${CF_ZONE_ID:-}" ]; then
            echo "CLOUDFLARE_VIBESPREVIEW_ZONE_ID unset — skipping DNS/TLS cleanup"
            exit 0
          fi
          # Same surfacing helper as vibes-diy-pr-preview.yaml — print the
          # CF error body to stderr on failure so cleanup doesn't die
          # silently (silent cleanup failures = cert packs accumulating
          # forever).
          api() {
            local tmp http
            tmp=$(mktemp)
            http=$(curl -sS -o "$tmp" -w '%{http_code}' \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" "$@")
            if [ "$http" -ge 400 ] || [ "$(jq -r '.success // true' "$tmp" 2>/dev/null)" = "false" ]; then
              echo "::error::CF API $* failed (HTTP $http): $(cat "$tmp")" >&2
              rm -f "$tmp"
              return 1
            fi
            cat "$tmp"
            rm -f "$tmp"
          }

          # ACM advanced cert pack(s) whose hosts include pr-<N>.vibespreview.dev
          for ID in $(api "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/ssl/certificate_packs?status=all" \
            | jq -r --arg h "${PREVIEW_HOST}" '.result[] | select(.type=="advanced") | select((.hosts // []) | index($h)) | .id'); do
            api -X DELETE "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/ssl/certificate_packs/${ID}" > /dev/null || true
            echo "Deleted ACM cert pack ${ID}"
          done

          # The per-PR deep wildcard. The per-PR apex
          # `pr-<N>.vibespreview.dev` was never created (it's served by the
          # zone-wide static `*.vibespreview.dev` record), so nothing to
          # delete there.
          NAME="*.${PREVIEW_HOST}"
          for ID in $(api "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${NAME}" | jq -r '.result[].id'); do
            api -X DELETE "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${ID}" > /dev/null || true
            echo "Deleted DNS record ${NAME} (${ID})"
          done

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const workerName = '${{ steps.pr.outputs.worker_name }}';
            const status = '${{ steps.delete.outputs.status }}';
            const note = status === 'not_found'
              ? 'No preview worker was found (may not have been deployed for this PR).'
              : `Preview worker \`${workerName}\` has been deleted.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## Preview Cleanup\n\n${note}\n\n---\n<sub>Resources cleaned up automatically on PR close.</sub>`,
            });
