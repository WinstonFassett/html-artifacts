<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>vibes.diy growth report</title>
    <style>
      @import url("https://fonts.cdnfonts.com/css/alte-haas-grotesk");

      :root {
        color-scheme: light dark;
        --black: #000000;
        --near-black: #231f20;
        --gray-dark: #333333;
        --gray-mid: #6b6b6b;
        --gray-light: #cccdc8;
        --cream: #fffff0;
        --paper: #fffff0;
        --white: #ffffff;
        --red: #da291c;
        --red-soft: rgba(218, 41, 28, 0.608);
        --cyan: #009ace;
        --cyan-soft: rgba(0, 154, 206, 0.608);
        --yellow: #fedd00;
        --yellow-soft: rgba(254, 221, 0, 0.608);

        --font-main: "Alte Haas Grotesk", -apple-system, "Segoe UI", sans-serif;

        --grid-size: 40px;
        --card-border: 2px solid var(--black);
        --radius: 4px;
        --gutter: clamp(1rem, 4vw, 3rem);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --black: #f0f0e8;
          --near-black: #d8d8d0;
          --gray-dark: #a8a8a0;
          --gray-mid: #686860;
          --gray-light: #303028;
          --cream: #1a1a18;
          --paper: #242420;
          --card-border: 1px solid rgba(240, 240, 232, 0.15);
        }
        body {
          background-color: #2a2a2a;
          background-image:
            linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
        }
        .section-label--filled {
          background: var(--near-black);
          color: var(--cream);
          border-color: var(--near-black);
        }
        .trend-tooltip {
          background: var(--paper);
          border-color: rgba(240, 240, 232, 0.2);
        }
        .err {
          background: var(--paper);
          border-color: rgba(240, 240, 232, 0.15);
        }
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: #cccdc8;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.5) 1px, transparent 1px);
        background-size: var(--grid-size) var(--grid-size);
        color: var(--near-black);
        font-family: var(--font-main);
        font-size: clamp(1rem, 1.1vw, 1.125rem);
        line-height: 1.6;
        overflow-x: hidden;
        min-height: 100vh;
      }

      ::selection {
        background: var(--yellow);
        color: var(--black);
      }

      a {
        color: var(--red);
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: color 0.2s;
      }
      a:hover {
        color: var(--black);
      }

      h1,
      h2,
      h3 {
        font-family: var(--font-main);
        font-weight: normal;
        line-height: 1.1;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem var(--gutter);
      }

      /* Card system */
      .card {
        background: var(--cream);
        border: var(--card-border);
        padding: clamp(1.5rem, 4vw, 3rem);
        margin-bottom: 1.5rem;
        position: relative;
      }
      .card--white {
        background: var(--cream);
      }
      .card--hero {
        padding: clamp(2rem, 6vw, 4rem);
      }
      .card--red {
        background: var(--red);
        color: var(--cream);
      }
      .card--cyan {
        background: var(--cyan);
        color: var(--cream);
      }
      .card--yellow {
        background: var(--yellow);
        color: var(--black);
      }
      .card--black {
        background: var(--black);
        color: var(--cream);
      }

      /* Grids */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .grid-2-1 {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
        align-items: start;
      }

      /* Hero */
      .hero h1 {
        font-size: clamp(2.5rem, 5.5vw, 4.5rem);
        line-height: 1.05;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      .hero-sub {
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        line-height: 1.4;
        color: var(--gray-dark);
      }
      .hero-stat-number {
        font-size: clamp(2rem, 4vw, 3.5rem);
        font-weight: bold;
        line-height: 1;
        margin-bottom: 0.25rem;
      }

      /* Compact callout cards — sized so 4-5 fit vertically beside the hero. */
      .callout {
        padding: 1rem 1.25rem;
      }
      .callout .section-label {
        font-size: 0.65rem;
        padding: 0.2rem 0.5rem;
        margin-bottom: 0.5rem;
      }
      .callout .callout-stat {
        font-size: clamp(1.5rem, 3vw, 2.25rem);
        font-weight: bold;
        line-height: 1;
        margin-bottom: 0.3rem;
      }
      .callout p {
        font-size: 0.8rem;
        line-height: 1.35;
        margin: 0;
      }

      /* Labels & titles */
      .section-label {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: bold;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.3rem 0.75rem;
        margin-bottom: 1rem;
        border: 2px solid currentColor;
      }
      .section-label--filled {
        background: var(--black);
        color: var(--cream);
        border-color: var(--black);
      }

      .section-title {
        font-size: clamp(2rem, 4.5vw, 3.5rem);
        line-height: 1.08;
        margin-bottom: 1rem;
        letter-spacing: -0.01em;
      }
      .section-intro {
        font-size: clamp(1rem, 1.5vw, 1.2rem);
        color: var(--gray-dark);
        max-width: 38em;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      /* Metric blocks (analogous to gallery-card head + body) */
      .metric-card {
        padding: 1.5rem clamp(1.5rem, 4vw, 3rem);
      }
      .metric-label {
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--gray-mid);
        margin-bottom: 0.5rem;
      }
      .metric-value {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: bold;
        line-height: 1;
      }

      /* Sign out button matches nav-cta-btn but in red */
      .btn {
        align-self: start;
        background: var(--red);
        color: var(--cream);
        border: 2px solid var(--black);
        padding: 0.5rem 1.2rem;
        font-family: var(--font-main);
        font-size: 0.85rem;
        font-weight: bold;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .btn:hover {
        background: var(--near-black);
        transform: translateY(-1px);
      }

      /* Trend chart card */
      .trend-card {
        padding: 1.5rem clamp(1.5rem, 4vw, 3rem);
        position: relative;
      }
      .trend-meta {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .trend-current {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: bold;
        line-height: 1;
      }
      .trend-range {
        font-size: 0.8rem;
        color: var(--gray-mid);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .trend-chart {
        width: 100%;
        height: auto;
        display: block;
      }
      .trend-point {
        cursor: pointer;
      }
      .trend-tooltip {
        position: absolute;
        background: var(--cream);
        border: 2px solid var(--black);
        padding: 0.6rem 0.9rem;
        font-size: 0.85rem;
        max-width: 320px;
        pointer-events: none;
        z-index: 10;
      }
      .trend-tooltip .tt-day {
        font-size: 0.7rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gray-mid);
        margin-bottom: 0.2rem;
      }
      .trend-tooltip .tt-value {
        font-size: 1.2rem;
        font-weight: bold;
        line-height: 1;
        margin-bottom: 0.35rem;
      }
      .trend-tooltip .tt-slugs {
        font-size: 0.85rem;
        line-height: 1.4;
        color: var(--gray-dark);
      }

      /* Placeholders */
      .empty {
        font-size: 0.95rem;
        color: var(--gray-mid);
        padding: 1rem 0;
      }
      .err {
        background: var(--cream);
        border: 2px solid var(--black);
        border-left: 6px solid var(--red);
        padding: 1rem 1.25rem;
        font-size: 0.95rem;
        color: var(--near-black);
      }
      .err .err-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--red);
        font-weight: bold;
        margin-bottom: 0.25rem;
      }

      /* Color stripe */
      .color-stripe {
        height: 8px;
        display: flex;
        margin-bottom: 1.5rem;
      }
      .color-stripe > div {
        flex: 1;
      }

      .signin-wrap {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .boot {
        padding: 2rem var(--gutter);
        color: var(--gray-mid);
      }

      @media (max-width: 900px) {
        .grid-3 {
          grid-template-columns: 1fr 1fr;
        }
        .grid-2-1 {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 600px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
