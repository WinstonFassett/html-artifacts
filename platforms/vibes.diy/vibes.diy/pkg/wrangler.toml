[[env.dev.migrations]]
tag = "v2"
new_classes = ["DocNotify"]

[[env.dev.migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[env.dev.migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[env.dev.migrations]]
