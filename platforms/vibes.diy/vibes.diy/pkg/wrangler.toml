[env.cli]
name = "vibes-diy-v2-cli"
vars = { ENVIRONMENT = "cli" }
logpush = true
routes = [
  { pattern = "cli-v2.vibesdiy.net/*", zone_name = "vibesdiy.net" },
  { pattern = "*.cli-v2.vibesdiy.net/*", zone_name = "vibesdiy.net" }
]

[env.cli.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[env.cli.browser]
binding = "BROWSER"

# cli keeps its own ChatSessions (per-env fan-out, scale isolation, future
# divergence anchor for cli-specific prompts/rate-limits/auth). The
# cross-script DOC_NOTIFY binding was removed as part of DocNotify
# retirement (#2265) — DocNotify is dead code (live fan-out now runs through
# per-vibe localBroadcastCallbacks, see #2253), so cli no longer references
# prod's class. This Step B deploy also deletes cli's dormant local DocNotify
# class via the cli `v6 deleted_classes` migration below (required because the
# DocNotify source is removed in this PR). Deploy order is still cli BEFORE
# prod, so prod's class loses its last reference before prod deletes it.
[env.cli.durable_objects]
bindings = [
  { name = "CHAT_SESSIONS", class_name = "ChatSessions" },
  { name = "APP_SESSIONS", class_name = "AppSessions", script_name = "vibes-diy-v2-prod" },
  { name = "USER_NOTIFY", class_name = "UserNotify", script_name = "vibes-diy-v2-prod" },
  { name = "ACCESS_FN_DO", class_name = "AccessFnDO" },
]

[[env.cli.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

# v2 is historical and must stay: cli originally declared its own local
# DocNotify class, the live worker has v2 applied, and wrangler refuses
# to deploy when a live tag is missing from config (10074 — tries to
# reset+reapply and trips on existing classes).
#
# The cross-script DOC_NOTIFY binding was removed in #2297. Keep this
# historical `v2 new_classes=["DocNotify"]` entry — wrangler refuses to
# deploy when a previously-applied tag is missing from config. The dormant
# class itself is deleted by the cli `v6 deleted_classes` migration below:
# now that this Step B deploy removes the DocNotify source, the cli worker no
# longer exports the class, so the registry entry must be retired in the same
# deploy (otherwise Cloudflare rejects the worker for a missing DO class).
[[env.cli.migrations]]
tag = "v2"
new_classes = ["DocNotify"]

# v3: UserNotify is cross-script-bound to vibes-diy-v2-prod (same pattern as
# DocNotify). The local class registry entry stays dormant for the same reason.
[[env.cli.migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[env.cli.migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[env.cli.migrations]]
tag = "v5"
new_classes = ["AppSessions"]

# v6: retire cli's dormant local DocNotify class. Safe now that #2297 removed
# the cross-script DOC_NOTIFY binding (no 10061), and required because this
# Step B deploy deletes the DocNotify source so the worker no longer exports
# the class. (#2265)
[[env.cli.migrations]]
tag = "v6"
deleted_classes = ["DocNotify"]

[[env.cli.d1_databases]]
binding = "DB"
database_name = "prod-vibes-diy-v2"
database_id = "0f783eae-91cf-49c4-a706-6e4d2498cb4a"

[[env.cli.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.cli.queues.producers]]
queue = "vibes-service-prod"
binding = "VIBES_SERVICE"


