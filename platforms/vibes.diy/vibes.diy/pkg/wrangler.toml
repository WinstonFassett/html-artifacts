name = "vibes-diy-v2"
main = "./workers/app.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

vars = { ENVIRONMENT = "test" }

#[observability.logs]
#enabled = true

[assets]
directory = "build/client"
binding = "ASSETS"

[browser]
binding = "BROWSER"

[durable_objects]
bindings = [
  { name = "CHAT_SESSIONS", class_name = "ChatSessions" },
  { name = "APP_SESSIONS", class_name = "AppSessions" },
  { name = "USER_NOTIFY", class_name = "UserNotify" },
  { name = "ACCESS_FN_DO", class_name = "AccessFnDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[migrations]]
tag = "v2"
new_classes = ["DocNotify"]

[[migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[migrations]]
tag = "v5"
new_classes = ["AppSessions"]

# v6: DocNotify is dead code (live fan-out moved to per-vibe
# localBroadcastCallbacks in #2253). Class deleted here; cli dropped its
# cross-script binding first (#2297) to clear the 10061 blocker. (#2265)
[[migrations]]
tag = "v6"
deleted_classes = ["DocNotify"]

[[d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[queues.producers]]
queue = "vibes-service"
binding = "VIBES_SERVICE"

[env.local]
name = "vibes-diy-v2-local"
vars = { ENVIRONMENT = "local" }
routes = [
  { pattern = "localhost.vibesdiy.net/*", zone_name = "vibesdiy.net" },
  { pattern = "*.localhost.vibesdiy.net/*", zone_name = "vibesdiy.net" }
]

[env.local.browser]
binding = "BROWSER"

[env.local.durable_objects]
bindings = [
  { name = "CHAT_SESSIONS", class_name = "ChatSessions" },
  { name = "APP_SESSIONS", class_name = "AppSessions" },
  { name = "USER_NOTIFY", class_name = "UserNotify" },
  { name = "ACCESS_FN_DO", class_name = "AccessFnDO" },
]

[[env.local.migrations]]
tag = "v1"
new_classes = ["ChatSessions"]

[[env.local.migrations]]
tag = "v2"
new_classes = ["DocNotify"]

[[env.local.migrations]]
tag = "v3"
new_classes = ["UserNotify"]

[[env.local.migrations]]
tag = "v4"
new_classes = ["AccessFnDO"]

[[env.local.migrations]]
tag = "v5"
new_classes = ["AppSessions"]

[[env.local.migrations]]
tag = "v6"
deleted_classes = ["DocNotify"]

[[env.local.d1_databases]]
binding = "DB"
database_name = "dev-vibes-diy-v2"
database_id = "105530de-9900-435b-92f4-15347af604f6"

[[env.local.r2_buckets]]
binding = "FS_IDS_BUCKET"
bucket_name = "vibes-diy-fs-ids"

[[env.local.queues.producers]]
queue = "vibes-service-local"
binding = "VIBES_SERVICE"

[env.dev]
name = "vibes-diy-v2-dev"
vars = { ENVIRONMENT = "dev" }
routes = [
  { pattern = "dev-v2.vibesdiy.net/*", zone_name = "vibesdiy.net" },
