<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preact Shopping Cart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        #root {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .product-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 1.3rem;
            color: #e74c3c;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .product-stock {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 12px;
        }
        .quantity-input {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .quantity-input input {
            width: 50px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2980b9; }
        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .cart-sidebar {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }
        .cart-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }
        .cart-empty {
            color: #7f8c8d;
            text-align: center;
            padding: 20px 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-name {
            flex: 1;
            font-weight: 500;
            color: #333;
        }
        .cart-item-price {
            color: #e74c3c;
            font-weight: 600;
            margin-right: 8px;
        }
        .cart-remove {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .cart-remove:hover { background: #c0392b; }
        .cart-summary {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #333;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #333;
        }
        .summary-row.total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e74c3c;
        }
        .checkout-btn {
            margin-top: 16px;
            background: #27ae60;
        }
        .checkout-btn:hover { background: #229954; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10",
            "preact/hooks": "https://esm.sh/preact@10/hooks?external=preact"
        }
    }
    </script>
    <script type="module">
    import { html, render } from 'https://esm.sh/htm@3/preact?external=preact';
    import { useState } from 'preact/hooks';

    const PRODUCTS = [
        { id: 1, name: 'Laptop', price: 999, stock: 5 },
        { id: 2, name: 'Mouse', price: 29, stock: 20 },
        { id: 3, name: 'Keyboard', price: 79, stock: 10 },
        { id: 4, name: 'Monitor', price: 299, stock: 3 },
        { id: 5, name: 'Headphones', price: 149, stock: 8 },
        { id: 6, name: 'USB Cable', price: 9, stock: 50 },
    ];

    function ShoppingCart() {
        const [cart, setCart] = useState([]);
        const [quantities, setQuantities] = useState({});

        const addToCart = (product) => {
            const qty = parseInt(quantities[product.id] || '1');
            if (qty > 0 && qty <= product.stock) {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    setCart(cart.map(item =>
                        item.id === product.id
                            ? { ...item, quantity: item.quantity + qty }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: qty }]);
                }
                setQuantities({ ...quantities, [product.id]: '' });
            }
        };

        const removeFromCart = (id) => {
            setCart(cart.filter(item => item.id !== id));
        };

        const updateQuantity = (id, value) => {
            setQuantities({ ...quantities, [id]: value });
        };

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

        return html\`
            <h1>🛒 Shopping Cart Demo</h1>
            <div class="container">
                <div class="products">
                    \${PRODUCTS.map(product => html\`
                        <div class="product-card" key=\${product.id}>
                            <div class="product-name">\${product.name}</div>
                            <div class="product-price">$\${product.price}</div>
                            <div class="product-stock">Stock: \${product.stock}</div>
                            <div class="quantity-input">
                                <input
                                    type="number"
                                    min="1"
                                    max=\${product.stock}
                                    value=\${quantities[product.id] || ''}
                                    onInput=\${(e) => updateQuantity(product.id, e.target.value)}
                                    placeholder="Qty"
                                />
                            </div>
                            <button
                                onClick=\${() => addToCart(product)}
                                disabled=\${(quantities[product.id] || '').length === 0}
                            >
                                Add to Cart
                            </button>
                        </div>
                    \`)}
                </div>

                <div class="cart-sidebar">
                    <div class="cart-title">Cart (\${cart.length})</div>
                    \${cart.length === 0
                        ? html\`<div class="cart-empty">Empty</div>\`
                        : html\`
                            \${cart.map(item => html\`
                                <div class="cart-item" key=\${item.id}>
                                    <span class="cart-item-name">\${item.name} ×\${item.quantity}</span>
                                    <span class="cart-item-price">$\${(item.price * item.quantity).toFixed(2)}</span>
                                    <button
                                        class="cart-remove"
                                        onClick=\${() => removeFromCart(item.id)}
                                    >
                                        ✕
                                    </button>
                                </div>
                            \`)}
                            <div class="cart-summary">
                                <div class="summary-row">
                                    <span>Subtotal:</span>
                                    <span>$\${total.toFixed(2)}</span>
                                </div>
                                <div class="summary-row">
                                    <span>Tax (10%):</span>
                                    <span>$\${(total * 0.1).toFixed(2)}</span>
                                </div>
                                <div class="summary-row total">
                                    <span>Total:</span>
                                    <span>$\${(total * 1.1).toFixed(2)}</span>
                                </div>
                                <button class="checkout-btn">Checkout</button>
                            </div>
                        \`
                    }
                </div>
            </div>
        \`;
    }

    render(html\`<\${ShoppingCart} />\`, document.getElementById('root'));
    </script>
</body>
</html>
