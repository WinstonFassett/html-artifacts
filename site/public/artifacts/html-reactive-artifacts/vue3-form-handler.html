<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 3 Form Handler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        #app {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 2rem; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .success-message {
            margin-top: 20px;
            padding: 16px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            color: #155724;
        }
        .form-preview {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .form-preview h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        pre {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
    const { createApp, ref, computed } = Vue;

    const App = {
        template: `
            <div>
                <h1>📝 Vue 3 Form</h1>
                <form @submit.prevent="submit">
                    <div class="form-group">
                        <label>Full Name:</label>
                        <input v-model="form.name" type="text" placeholder="John Doe" />
                    </div>

                    <div class="form-group">
                        <label>Email:</label>
                        <input v-model="form.email" type="email" placeholder="john@example.com" />
                    </div>

                    <div class="form-group">
                        <label>Message:</label>
                        <textarea v-model="form.message" placeholder="Your message here..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Country:</label>
                        <select v-model="form.country">
                            <option value="">-- Select --</option>
                            <option>USA</option>
                            <option>Canada</option>
                            <option>UK</option>
                            <option>Australia</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Interests:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.interests" 
                                    type="checkbox" 
                                    value="coding"
                                    id="coding"
                                />
                                <label for="coding">Coding</label>
                            </div>
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.interests" 
                                    type="checkbox" 
                                    value="design"
                                    id="design"
                                />
                                <label for="design">Design</label>
                            </div>
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.interests" 
                                    type="checkbox" 
                                    value="music"
                                    id="music"
                                />
                                <label for="music">Music</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Subscription:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.subscription" 
                                    type="radio" 
                                    value="free"
                                    id="free"
                                />
                                <label for="free">Free</label>
                            </div>
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.subscription" 
                                    type="radio" 
                                    value="pro"
                                    id="pro"
                                />
                                <label for="pro">Pro</label>
                            </div>
                            <div class="checkbox-item">
                                <input 
                                    v-model="form.subscription" 
                                    type="radio" 
                                    value="enterprise"
                                    id="enterprise"
                                />
                                <label for="enterprise">Enterprise</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit">Submit</button>

                    <div v-if="submitted" class="success-message">
                        ✓ Form submitted successfully!
                    </div>
                </form>

                <div class="form-preview">
                    <h3>📊 Live Preview:</h3>
                    <pre>{{ JSON.stringify(form, null, 2) }}</pre>
                </div>
            </div>
        `,
        setup() {
            const form = ref({
                name: '',
                email: '',
                message: '',
                country: '',
                interests: [],
                subscription: 'free'
            });
            const submitted = ref(false);

            const submit = () => {
                submitted.value = true;
                setTimeout(() => { submitted.value = false; }, 3000);
            };

            return {
                form,
                submitted,
                submit
            };
        }
    };

    createApp(App).mount('#app');
    </script>
</body>
</html>
