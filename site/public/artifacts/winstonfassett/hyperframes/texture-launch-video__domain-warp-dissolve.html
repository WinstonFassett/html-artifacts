<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Lato:wght@400;700&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #0d1b2a;
        }

        /* Blueprint grid */
        .bp-grid {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }

        /* Layout */
        .bp-left {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 1200px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .bp-right {
          position: absolute;
          right: 0;
          top: 0;
          bottom: 0;
          width: 720px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 60px 60px 60px 40px;
        }
        .bp-divider {
          position: absolute;
          left: 1200px;
          top: 60px;
          bottom: 60px;
          width: 1px;
          background: #00f5d4;
          opacity: 0.15;
        }
        .bp-number {
          font-family: "Space Mono", monospace;
          font-size: 14px;

          position: absolute;
          top: 40px;

        }

        /* Right panel typography */
        .bp-name {
          font-family: "Bebas Neue", sans-serif;
          font-size: 38px;

          margin-bottom: 20px;

        }
        .bp-plabel {
          font-family: "Space Mono", monospace;

          text-transform: uppercase;

        }
        .bp-prompt {

        }
        .bp-desc {
          font-family: "Lato", sans-serif;

        }

        /* GL scenes (hidden, just for texture capture) */
        .scene {
          position: absolute;
          top: 0;

          overflow: hidden;
          display: flex;
          align-items: center;

          font-family: "Bebas Neue", sans-serif;
          font-size: 140px;
          letter-spacing: 0.06em;
          opacity: 0.12;
        }
      </style>

      <div class="bp-grid"></div>
      <div class="bp-divider"></div>
      <div class="bp-number">01 / 14</div>

      <!-- GL demo scenes (captured as textures, then hidden) -->
      <div id="s1" class="scene" style="background: #0d1b2a">
        <div class="scene-label" style="color: #00f5d4">SCENE A</div>
      </div>
      <div id="s2" class="scene" style="background: #00f5d4; opacity: 0">
        <div class="scene-label" style="color: #0d1b2a">SCENE B</div>
      </div>

      <!-- GL canvas (left panel only) -->
      <canvas
        id="gl-canvas"
        width="1200"
        height="1080"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 1200px;
          height: 1080px;
          z-index: 10;
          pointer-events: none;
          display: none;
        "
      >
      </canvas>

      <!-- Right panel metadata -->
      <div class="bp-right">
        <div class="bp-name">Domain Warp Dissolve</div>
        <div class="bp-plabel">Prompt</div>
        <div class="bp-prompt">"use domain warp dissolve shader transition"</div>
        <div class="bp-desc">
          Cascaded fbm(p + fbm(p)) displaces both scenes along a warp field. Iridescent
          cosine-palette edge glow.
        </div>
      </div>

      <div
        id="driver"
        class="clip"
        data-start="0"
        data-duration="4"
        data-track-index="0"
        style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var glCanvas = document.getElementById("gl-canvas");
      var gl = glCanvas.getContext("webgl", { preserveDrawingBuffer: true });
      if (!gl) {
        console.warn("WebGL not available");
        window.__timelines["main"] = gsap.timeline({ paused: true });
      } else {
        gl.viewport(0, 0, 1200, 1080);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
        var sceneTextures = {};

        function captureScene(sceneId) {
          var scene = document.getElementById(sceneId);
          var origOpacity = scene.style.opacity;
          var origZ = scene.style.zIndex;
          scene.style.opacity = "1";
          scene.style.zIndex = "999";
          scene.offsetHeight;
          var c = document.createElement("canvas");
          c.width = 1200;
          c.height = 1080;
          var ctx = c.getContext("2d");
          ctx.fillStyle = window.getComputedStyle(scene).backgroundColor;
          ctx.fillRect(0, 0, 1200, 1080);
          var sr = scene.getBoundingClientRect();
          var els = scene.querySelectorAll("*");
          for (var i = 0; i < els.length; i++) {
            var el = els[i],
              cs = window.getComputedStyle(el);
            if (cs.display === "none" || cs.visibility === "hidden") continue;
            var r = el.getBoundingClientRect();
            if (r.width < 1 || r.height < 1) continue;
            var x = r.left - sr.left,
              y = r.top - sr.top,
              w = r.width,
              h = r.height;
            ctx.save();
            ctx.globalAlpha = parseFloat(cs.opacity) || 1;
            var bg = cs.backgroundColor;
            if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") {
              ctx.fillStyle = bg;
              ctx.fillRect(x, y, w, h);
            }
            var hasChildEls = el.querySelector("div,span,img,video");
            var text = "";
            for (var j = 0; j < el.childNodes.length; j++)
              if (el.childNodes[j].nodeType === 3) text += el.childNodes[j].textContent;
            text = text.trim();
            if (text && !hasChildEls) {
              ctx.font = cs.fontWeight + " " + cs.fontSize + " " + cs.fontFamily;
              ctx.fillStyle = cs.color;
              if (cs.letterSpacing && cs.letterSpacing !== "normal")
                ctx.letterSpacing = cs.letterSpacing;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(text, x + w / 2, y + h / 2);
            }
            ctx.restore();
          }
          scene.style.opacity = origOpacity;
          scene.style.zIndex = origZ;
          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
          sceneTextures[sceneId] = tex;
        }

        var vertSrc =
          "attribute vec2 a_pos; varying vec2 v_uv; void main(){" +
          "v_uv=a_pos*0.5+0.5; v_uv.y=1.0-v_uv.y; gl_Position=vec4(a_pos,0,1);}";
        var quadBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
          gl.STATIC_DRAW,
        );
        function compileShader(src, type) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
            console.error("Shader:", gl.getShaderInfoLog(s));
          return s;
        }
        function mkProg(fragSrc) {
          var p = gl.createProgram();
          gl.attachShader(p, compileShader(vertSrc, gl.VERTEX_SHADER));
          gl.attachShader(p, compileShader(fragSrc, gl.FRAGMENT_SHADER));
          gl.linkProgram(p);
          if (!gl.getProgramParameter(p, gl.LINK_STATUS))
            console.error("Link:", gl.getProgramInfoLog(p));
          return p;
        }

        var H =
          "precision mediump float;" +
          "varying vec2 v_uv;" +
          "uniform sampler2D u_from, u_to;" +
          "uniform float u_progress;" +
          "uniform vec2 u_resolution;\n";

        var NQ =
          "float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}" +
          "float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);" +
          "f=f*f*f*(f*(f*6.-15.)+10.);" +
          "return mix(mix(hash(i),hash(i+vec2(1,0)),f.x)," +
          "mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}" +
          "float fbm(vec2 p){float v=0.,a=.5;" +
          "mat2 R=mat2(.8,.6,-.6,.8);" +
          "for(int i=0;i<5;i++){v+=a*vnoise(p);p=R*p*2.02;a*=.5;}return v;}";
        var CP =
          "vec3 palette(float t,vec3 a,vec3 b,vec3 c,vec3 d){" + "return a+b*cos(6.2832*(c*t+d));}";

        var progPass = mkProg(H + "void main(){gl_FragColor=texture2D(u_from,v_uv);}");
        var progTrans = mkProg(
          H +
            NQ +
            CP +
            "void main(){vec2 q=vec2(fbm(v_uv*3.),fbm(v_uv*3.+vec2(5.2,1.3)));vec2 r=vec2(fbm(v_uv*3.+q*4.+vec2(1.7,9.2)),fbm(v_uv*3.+q*4.+vec2(8.3,2.8)));float n=fbm(v_uv*3.+r*2.);vec2 warpDir=(q-.5)*.4;vec4 A=texture2D(u_from,clamp(v_uv+warpDir*u_progress,0.,1.));vec4 B=texture2D(u_to,clamp(v_uv-warpDir*(1.-u_progress),0.,1.));float e=smoothstep(u_progress-.08,u_progress+.08,n);float ed=abs(n-u_progress);float em=smoothstep(.1,0.,ed)*(1.-step(1.,u_progress));vec3 ec=palette(ed*8.,vec3(.5),vec3(.5),vec3(1.),vec3(0.,.33,.67));gl_FragColor=vec4(mix(B,A,e).rgb+ec*em*2.,1.);}",
        );

        function renderShader(prog, texFrom, texTo, progress) {
          gl.useProgram(prog);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, texFrom);
          gl.uniform1i(gl.getUniformLocation(prog, "u_from"), 0);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, texTo);
          gl.uniform1i(gl.getUniformLocation(prog, "u_to"), 1);
          gl.uniform1f(gl.getUniformLocation(prog, "u_progress"), progress);
          gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), 1200, 1080);
          var pos = gl.getAttribLocation(prog, "a_pos");
          gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
          gl.enableVertexAttribArray(pos);
          gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        function easeInOut(p) {
          return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        }

        captureScene("s1");
        captureScene("s2");
        glCanvas.style.display = "block";
        renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
        document.querySelectorAll(".scene").forEach(function (s) {
          s.style.opacity = "0";
        });

        var tl = gsap.timeline({
          paused: true,
          onUpdate: function () {
            var t = tl.time();
            if (t >= 1.0 && t < 3.0) {
              renderShader(
                progTrans,
                sceneTextures["s1"],
                sceneTextures["s2"],
                easeInOut((t - 1.0) / 2.0),
              );
            } else if (t >= 3.0) {
              renderShader(progPass, sceneTextures["s2"], sceneTextures["s2"], 0);
            } else {
              renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
            }
          },
        });
        tl.to({ v: 0 }, { v: 1, duration: 4, ease: "none" }, 0);
        window.__timelines["main"] = tl;
      } // end if (gl)
    </script>
  <!-- hyperframes-harness: standalone play/scrub (+ optional autoplay/loop) for a paused
     GSAP composition. Handles both full-doc and <template>-wrapped compositions.
     Modes via URL query: ?autoplay=1  ?loop=1  ?chrome=0 (hide controls). -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness.hf-hidden { display: none; }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness button.hf-on { background: #6c7cff; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <button id="hf-loop" title="Loop">&#8635;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  var Q = new URLSearchParams(location.search);
  var WANT_AUTOPLAY = Q.get('autoplay') === '1';
  var WANT_LOOP = Q.get('loop') === '1';
  var WANT_CHROME = Q.get('chrome') !== '0';

  // GSAP must be a global before ANY composition script runs (template comps call
  // gsap at parse-time). Compositions load their own gsap from CDN, but to make
  // activation order-independent we ensure window.gsap exists first.
  function ensureGsap(cb) {
    if (window.gsap) return cb();
    // is the composition already loading a gsap <script src>? wait briefly for it.
    var waited = 0;
    (function poll() {
      if (window.gsap) return cb();
      if (waited > 1500) {  // inject our own as a fallback
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js';
        s.onload = cb; s.onerror = cb;
        document.head.appendChild(s);
        return;
      }
      waited += 60; setTimeout(poll, 60);
    })();
  }

  // Clone a <template> composition into a live stage. Cloned <script> tags are inert,
  // so recreate each one; external (src) scripts must finish before later inline
  // scripts run, so inject sequentially awaiting each src load.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done();
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++)
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      s.textContent = old.textContent;
      if (old.src) {
        s.onload = s.onerror = function () { next(i + 1); };
        old.parentNode.replaceChild(s, old);
      } else {
        old.parentNode.replaceChild(s, old); // inline runs synchronously on insert
        next(i + 1);
      }
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 80) return;
      return setTimeout(function () { boot((tries || 0) + 1); }, 60);
    }
    if (!id) id = Object.keys(tls)[0];

    var bar = document.getElementById('hf-harness');
    if (!WANT_CHROME) bar.classList.add('hf-hidden');

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var loopBtn = document.getElementById('hf-loop');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    var looping = WANT_LOOP;
    if (looping) loopBtn.classList.add('hf-on');

    // Track play state ourselves — GSAP's isActive() is unreliable right after load
    // (caused the "click play twice" bug), so don't derive UI/toggle from it.
    var playing = false;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);

    function play() { if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); playing = true; }
    function pause() { tl.pause(); playing = false; }
    tl.eventCallback('onComplete', function () {
      if (looping) { tl.time(0); tl.play(); } else { playing = false; }
    });

    playBtn.onclick = function () { playing ? pause() : play(); };
    restart.onclick = function () { tl.time(0); play(); };
    loopBtn.onclick = function () { looping = !looping; loopBtn.classList.toggle('hf-on', looping);
      if (looping && !playing) play(); };
    scrub.oninput = function () { pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - (WANT_CHROME ? 56 : 0);
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
    if (WANT_AUTOPLAY) play();
  }

  function start() { ensureGsap(function () { activateTemplate(function () { boot(0); }); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body>
</html>
