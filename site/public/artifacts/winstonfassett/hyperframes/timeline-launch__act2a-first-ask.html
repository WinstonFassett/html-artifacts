<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>act2a-first-ask — Hyperframes</title></head>
<body>
<template id="act2a-first-ask-template">
  <div data-composition-id="act2a-first-ask" data-width="1920" data-height="1080" data-start="0" data-duration="4">
    <div class="app">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="icon-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div class="logo-mark">
            <svg viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
              <g fill="#D97757">
                <path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/>
              </g>
            </svg>
          </div>
          <div class="project-name">Timeline Editor Launch</div>
        </div>
        <div class="topbar-right">
          <div class="model-pill">
            Claude Opus 4.7
            <svg viewBox="0 0 12 12" width="11" height="11"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          </div>
          <div class="avatar">J</div>
        </div>
      </div>

      <!-- Conversation thread -->
      <div class="thread">
        <div class="msg-user" id="msg-user">
          <div class="bubble">Can you move the sound effect 0.1s earlier?</div>
        </div>

        <div class="msg-claude" id="msg-claude">
          <div class="claude-mark">
            <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
              <g fill="#D97757">
                <path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/>
              </g>
            </svg>
          </div>
          <div class="claude-body">
            <div class="claude-text">
              <span class="typed"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Composer -->
      <div class="composer-wrap">
        <div class="composer">
          <div class="composer-text"></div>
          <div class="composer-actions">
            <div class="attach">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 11.5l-8.5 8.5a5 5 0 1 1-7-7l8.5-8.5a3.5 3.5 0 1 1 5 5L11 17.5a2 2 0 1 1-3-3l7-7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="send">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12l7-7 7 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div class="composer-meta">Claude can make mistakes. Please double-check responses.</div>
      </div>
    </div>

    <style>
      [data-composition-id="act2a-first-ask"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        font-family: ui-sans-serif, "Söhne", "Inter", system-ui, -apple-system, sans-serif;
        background: #F5F4ED;
        color: #3D3929;
      }
      [data-composition-id="act2a-first-ask"] .app {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        /* Zoom transform-origin anchored on the composer (bottom-center) */
        transform-origin: 50% 92%;
        will-change: transform;
      }

      /* Top bar */
      [data-composition-id="act2a-first-ask"] .topbar {
        height: 64px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #EBE7DB;
        background: #FAF9F5;
      }
      [data-composition-id="act2a-first-ask"] .topbar-left,
      [data-composition-id="act2a-first-ask"] .topbar-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      [data-composition-id="act2a-first-ask"] .icon-btn {
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 8px;
        color: #6B6757;
      }
      [data-composition-id="act2a-first-ask"] .logo-mark { display: flex; align-items: center; }
      [data-composition-id="act2a-first-ask"] .project-name {
        font-size: 18px;
        color: #3D3929;
        font-weight: 500;
      }
      [data-composition-id="act2a-first-ask"] .model-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        color: #6B6757;
        padding: 8px 14px;
        border-radius: 999px;
        background: #F0ECE0;
        border: 1px solid #E5E0D1;
      }
      [data-composition-id="act2a-first-ask"] .avatar {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: #D97757;
        color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-weight: 600;
        font-size: 15px;
      }

      /* Thread */
      [data-composition-id="act2a-first-ask"] .thread {
        flex: 1;
        padding: 80px 0 0 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 48px;
      }
      [data-composition-id="act2a-first-ask"] .msg-user {
        width: 900px;
        display: flex;
        justify-content: flex-end;
      }
      [data-composition-id="act2a-first-ask"] .msg-user .bubble {
        max-width: 620px;
        padding: 18px 24px;
        background: #F0ECE0;
        border: 1px solid #E5E0D1;
        border-radius: 18px;
        font-size: 22px;
        line-height: 1.5;
        color: #3D3929;
      }
      [data-composition-id="act2a-first-ask"] .msg-claude {
        width: 900px;
        display: flex;
        gap: 18px;
        align-items: flex-start;
      }
      [data-composition-id="act2a-first-ask"] .claude-mark {
        width: 40px; height: 40px;
        flex: 0 0 40px;
        border-radius: 10px;
        background: #FFFFFF;
        border: 1px solid #E5E0D1;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2a-first-ask"] .claude-body { padding-top: 6px; }
      [data-composition-id="act2a-first-ask"] .claude-text {
        font-size: 24px;
        line-height: 1.55;
        color: #2A2720;
        font-weight: 400;
      }
      [data-composition-id="act2a-first-ask"] .caret {
        display: inline-block;
        color: #D97757;
        transform: translateY(2px);
        margin-left: 2px;
      }

      /* Composer */
      [data-composition-id="act2a-first-ask"] .composer-wrap {
        padding: 0 0 44px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      [data-composition-id="act2a-first-ask"] .composer {
        width: 900px;
        min-height: 108px;
        background: #FFFFFF;
        border: 1px solid #E5E0D1;
        border-radius: 22px;
        box-shadow: 0 2px 12px rgba(61, 57, 41, 0.04);
        padding: 22px 22px 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      [data-composition-id="act2a-first-ask"] .composer-text {
        font-size: 20px;
        color: #8C8674;
        min-height: 28px;
      }
      [data-composition-id="act2a-first-ask"] .composer-text.placeholder::before {
        content: "How can I help you today?";
        color: #B3AD99;
      }
      [data-composition-id="act2a-first-ask"] .composer-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }
      [data-composition-id="act2a-first-ask"] .attach {
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        color: #8C8674;
        border-radius: 8px;
      }
      [data-composition-id="act2a-first-ask"] .send {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: #D97757;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2a-first-ask"] .composer-meta {
        font-size: 13px;
        color: #A19B87;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const scope = document.querySelector('[data-composition-id="act2a-first-ask"]');
        const q = (s) => scope.querySelector(s);

        const tl = gsap.timeline({ paused: true });

        const app = q(".app");
        const composerEl = q(".composer-text");
        const typed = q(".typed");

        // Initial DOM state
        composerEl.innerText = "";
        typed.innerText = "";

        // Initial animation state
        gsap.set(q("#msg-user"), { opacity: 0, y: 20 });
        gsap.set(q("#msg-claude"), { opacity: 0 });
        // Start zoomed-in on the composer (composer fills ~85% of frame)
        gsap.set(app, { scale: 1.9, y: -40 });

        // Typewriter in composer (we start mid-type so reader sees the finishing sweep)
        const userText = "Can you move the sound effect 0.1s earlier?";
        const typeObj = { i: 18 };
        tl.call(() => { composerEl.innerText = userText.slice(0, typeObj.i); }, [], 0.1);
        tl.to(typeObj, {
          i: userText.length,
          duration: 0.85,
          ease: "none",
          snap: { i: 1 },
          onUpdate: () => { composerEl.innerText = userText.slice(0, typeObj.i); }
        }, 0.1);

        // Subtle pan while typing — a small y drift so the zoomed view feels alive
        tl.to(app, {
          y: -50,
          duration: 0.85,
          ease: "sine.inOut"
        }, 0.1);

        // Send button pulse
        tl.to(q(".send"), { scale: 0.88, duration: 0.06, ease: "power2.out" }, 1.05)
          .to(q(".send"), { scale: 1, duration: 0.18, ease: "back.out(2)" }, 1.11)
          .call(() => { composerEl.innerText = ""; }, [], 1.12);

        // Quick 0.25s zoom-out + pan back to full view
        tl.to(app, {
          scale: 1, y: 0,
          duration: 0.25,
          ease: "power3.inOut"
        }, 1.15);

        // User message bubble appears in thread as the zoom completes
        tl.to(q("#msg-user"), {
          opacity: 1, y: 0, duration: 0.35, ease: "power2.out"
        }, 1.3);

        // Claude response block fades in
        tl.to(q("#msg-claude"), {
          opacity: 1, duration: 0.25, ease: "power1.out"
        }, 1.75);

        // Snap "Done." in — no streaming, no caret
        tl.call(() => { typed.innerText = "Done."; }, [], 1.9);

        // Pad to 4s
        tl.to({}, { duration: 4 }, 0);

        window.__timelines["act2a-first-ask"] = tl;
      })();
    </script>
  </div>
</template>

<!-- hyperframes-harness: standalone play/scrub (+ optional autoplay/loop) for a paused
     GSAP composition. Handles both full-doc and <template>-wrapped compositions.
     Modes via URL query: ?autoplay=1  ?loop=1  ?chrome=0 (hide controls). -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness.hf-hidden { display: none; }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness button.hf-on { background: #6c7cff; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <button id="hf-loop" title="Loop">&#8635;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  var Q = new URLSearchParams(location.search);
  var WANT_AUTOPLAY = Q.get('autoplay') === '1';
  var WANT_LOOP = Q.get('loop') === '1';
  var WANT_CHROME = Q.get('chrome') !== '0';

  // GSAP must be a global before ANY composition script runs (template comps call
  // gsap at parse-time). Compositions load their own gsap from CDN, but to make
  // activation order-independent we ensure window.gsap exists first.
  function ensureGsap(cb) {
    if (window.gsap) return cb();
    // is the composition already loading a gsap <script src>? wait briefly for it.
    var waited = 0;
    (function poll() {
      if (window.gsap) return cb();
      if (waited > 1500) {  // inject our own as a fallback
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js';
        s.onload = cb; s.onerror = cb;
        document.head.appendChild(s);
        return;
      }
      waited += 60; setTimeout(poll, 60);
    })();
  }

  // Clone a <template> composition into a live stage. Cloned <script> tags are inert,
  // so recreate each one; external (src) scripts must finish before later inline
  // scripts run, so inject sequentially awaiting each src load.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done();
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++)
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      s.textContent = old.textContent;
      if (old.src) {
        s.onload = s.onerror = function () { next(i + 1); };
        old.parentNode.replaceChild(s, old);
      } else {
        old.parentNode.replaceChild(s, old); // inline runs synchronously on insert
        next(i + 1);
      }
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 80) return;
      return setTimeout(function () { boot((tries || 0) + 1); }, 60);
    }
    if (!id) id = Object.keys(tls)[0];

    var bar = document.getElementById('hf-harness');
    if (!WANT_CHROME) bar.classList.add('hf-hidden');

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var loopBtn = document.getElementById('hf-loop');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    var looping = WANT_LOOP;
    if (looping) loopBtn.classList.add('hf-on');

    // Track play state ourselves — GSAP's isActive() is unreliable right after load
    // (caused the "click play twice" bug), so don't derive UI/toggle from it.
    var playing = false;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);

    function play() { if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); playing = true; }
    function pause() { tl.pause(); playing = false; }
    tl.eventCallback('onComplete', function () {
      if (looping) { tl.time(0); tl.play(); } else { playing = false; }
    });

    playBtn.onclick = function () { playing ? pause() : play(); };
    restart.onclick = function () { tl.time(0); play(); };
    loopBtn.onclick = function () { looping = !looping; loopBtn.classList.toggle('hf-on', looping);
      if (looping && !playing) play(); };
    scrub.oninput = function () { pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - (WANT_CHROME ? 56 : 0);
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
    if (WANT_AUTOPLAY) play();
  }

  function start() { ensureGsap(function () { activateTemplate(function () { boot(0); }); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body></html>
