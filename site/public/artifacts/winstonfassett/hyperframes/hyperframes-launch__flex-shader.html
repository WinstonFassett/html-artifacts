<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>flex-shader — Hyperframes</title></head>
<body>
<template id="flex-shader-template">
  <div
    data-composition-id="flex-shader"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="0.94"
  >
    <!-- WebGL canvas — real fragment shader generative art -->
    <canvas id="shader-canvas" width="1920" height="1080"></canvas>

    <div class="shader-label">Shaders</div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@500&display=swap");

      [data-composition-id="flex-shader"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #0a0a12;
      }
      [data-composition-id="flex-shader"] #shader-canvas {
        position: absolute; top: 0; left: 0;
        width: 1920px; height: 1080px;
      }

      [data-composition-id="flex-shader"] .shader-label {
        position: absolute;
        bottom: 60px; right: 80px;
        font-family: "Azeret Mono", monospace;
        font-weight: 500;
        font-size: 28px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.08em;
        z-index: 2;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="flex-shader"]');
        var canvas = root.querySelector("#shader-canvas");
        var label = root.querySelector(".shader-label");
        var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

        if (!gl) {
          // Fallback: paint a static gradient if WebGL unavailable (headless validation)
          var ctx2d = canvas.getContext("2d");
          if (ctx2d) {
            var grd = ctx2d.createRadialGradient(960, 540, 100, 960, 540, 900);
            grd.addColorStop(0, "#e8935d");
            grd.addColorStop(0.35, "#d4586a");
            grd.addColorStop(0.65, "#7fc3c8");
            grd.addColorStop(1, "#0a0a12");
            ctx2d.fillStyle = grd;
            ctx2d.fillRect(0, 0, 1920, 1080);
          }
          gsap.set(label, { opacity: 0.35 });
          // Pad timeline to master slot duration (1.20s) to prevent black frames at beat tail
          tl.to({}, { duration: 1.20 }, 0);
          window.__timelines["flex-shader"] = tl;
          return;
        }

        // Vertex shader — simple fullscreen quad
        var vsrc = [
          "attribute vec2 a_pos;",
          "varying vec2 v_uv;",
          "void main() {",
          "  v_uv = a_pos * 0.5 + 0.5;",
          "  gl_Position = vec4(a_pos, 0.0, 1.0);",
          "}"
        ].join("\n");

        // Fragment shader — domain warp generative art
        // Cascaded FBM with cosine palette. Organic, warm, iridescent.
        var fsrc = [
          "precision mediump float;",
          "varying vec2 v_uv;",
          "uniform float u_time;",
          "uniform vec2 u_res;",
          "",
          "// Hash-based noise (deterministic, no textures needed)",
          "float hash(vec2 p) {",
          "  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);",
          "}",
          "float noise(vec2 p) {",
          "  vec2 i = floor(p), f = fract(p);",
          "  f = f * f * (3.0 - 2.0 * f);",
          "  return mix(",
          "    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),",
          "    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),",
          "    f.y);",
          "}",
          "float fbm(vec2 p) {",
          "  float v = 0.0, a = 0.5;",
          "  mat2 R = mat2(0.8, 0.6, -0.6, 0.8);",
          "  for (int i = 0; i < 5; i++) {",
          "    v += a * noise(p);",
          "    p = R * p * 2.02;",
          "    a *= 0.5;",
          "  }",
          "  return v;",
          "}",
          "",
          "// Cosine palette",
          "vec3 palette(float t) {",
          "  vec3 a = vec3(0.5, 0.5, 0.5);",
          "  vec3 b = vec3(0.5, 0.5, 0.5);",
          "  vec3 c = vec3(1.0, 1.0, 1.0);",
          "  vec3 d = vec3(0.0, 0.33, 0.67);",
          "  return a + b * cos(6.28318 * (c * t + d));",
          "}",
          "",
          "void main() {",
          "  vec2 uv = v_uv;",
          "  uv.x *= u_res.x / u_res.y;",
          "  float t = u_time * 0.4;",
          "",
          "  // Domain warp: fbm(p + fbm(p + fbm(p)))",
          "  vec2 q = vec2(fbm(uv * 3.0 + t * 0.3), fbm(uv * 3.0 + vec2(5.2, 1.3) + t * 0.2));",
          "  vec2 r = vec2(",
          "    fbm(uv * 3.0 + q * 4.0 + vec2(1.7, 9.2) + t * 0.15),",
          "    fbm(uv * 3.0 + q * 4.0 + vec2(8.3, 2.8) + t * 0.1)",
          "  );",
          "  float n = fbm(uv * 3.0 + r * 2.0);",
          "",
          "  // Color from warp field",
          "  vec3 col = palette(n * 2.0 + t * 0.2);",
          "  col = mix(col, palette(length(q) * 3.0 + t * 0.1), 0.4);",
          "  col *= 0.7 + 0.3 * n;",
          "",
          "  // Warm tint + vignette",
          "  col = mix(col, vec3(0.92, 0.58, 0.35), 0.08);",
          "  float vig = 1.0 - 0.4 * length(v_uv - 0.5);",
          "  col *= vig;",
          "",
          "  gl_FragColor = vec4(col, 1.0);",
          "}"
        ].join("\n");

        // Compile shaders
        function mkShader(type, src) {
          var sh = gl.createShader(type);
          gl.shaderSource(sh, src);
          gl.compileShader(sh);
          return sh;
        }
        var prog = gl.createProgram();
        gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, vsrc));
        gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fsrc));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        // Fullscreen quad
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        var aPos = gl.getAttribLocation(prog, "a_pos");
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        // Uniforms
        var uTime = gl.getUniformLocation(prog, "u_time");
        var uRes = gl.getUniformLocation(prog, "u_res");
        gl.uniform2f(uRes, 1920, 1080);

        // Render function
        function renderFrame(time) {
          gl.uniform1f(uTime, time);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        // Initial render
        renderFrame(0.5);

        // GSAP drives the time uniform via proxy
        var proxy = { time: 0.5 };
        tl.to(proxy, {
          time: 1.44,
          duration: 0.94,
          ease: "none",
          onUpdate: function () { renderFrame(proxy.time); }
        }, 0);

        // Label fades in
        gsap.set(label, { opacity: 0 });
        tl.to(label, { opacity: 0.35, duration: 0.3, ease: "power2.out" }, 0.15);

        // Pad timeline to master slot duration (1.20s) to prevent black frames at beat tail
        tl.to({}, { duration: 1.20 }, 0);

        window.__timelines["flex-shader"] = tl;
      })();
    </script>
  </div>
</template>

<!-- hyperframes-harness: standalone play/scrub for a paused GSAP composition.
     Handles both full-doc compositions and <template>-wrapped ones. -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  // If the composition is wrapped in a <template>, clone it into a live stage.
  // Cloned <script> tags don't execute, so we recreate each one. External
  // (src) scripts must finish loading before later inline scripts run, so we
  // inject sequentially, awaiting each external script's load event.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done(); // already live
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++) {
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      }
      s.textContent = old.textContent;
      if (old.src) { s.onload = s.onerror = function () { next(i + 1); }; }
      old.parentNode.replaceChild(s, old);
      if (!old.src) next(i + 1); // inline scripts run synchronously on insert
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 60) return;       // give CDN scripts ~5s
      return setTimeout(function () { boot((tries || 0) + 1); }, 80);
    }
    if (!id) id = Object.keys(tls)[0];

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = tl.isActive() ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);
    playBtn.onclick = function () {
      if (tl.isActive()) tl.pause();
      else { if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); }
    };
    restart.onclick = function () { tl.pause(); tl.time(0); sync(); };
    scrub.oninput = function () { tl.pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - 56;
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
  }
  function start() { activateTemplate(function () { boot(0); }); }
  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body></html>
