<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>act1-late-sfx — Hyperframes</title></head>
<body>
<template id="act1-late-sfx-template">
  <div data-composition-id="act1-late-sfx" data-width="1920" data-height="1080" data-start="0" data-duration="4">
    <div class="stage">
      <div class="grain"></div>

      <div class="label-top">SOUND TEST</div>
      <div class="label-bottom">press&nbsp;&nbsp;to&nbsp;&nbsp;honk</div>

      <div class="button-wrap">
        <div class="button-shadow"></div>
        <div class="button-ring"></div>
        <div class="button">
          <svg class="speaker" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M14 24h10l14-10v36L24 40H14z" fill="currentColor" />
            <path
              d="M46 22c4 3 4 17 0 20M52 16c8 6 8 26 0 32"
              stroke="currentColor"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
          <div class="button-text">HONK</div>
        </div>
      </div>

      <!-- Late-SFX visual burst (fires 0.28s after the click) -->
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="honk-burst">
        <div class="honk-word">HONK!</div>
      </div>

      <!-- Simulated cursor -->
      <svg class="cursor" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M4 2 L4 20 L9 15 L12 22 L15 20.5 L12 14 L19 14 Z"
          fill="#ffffff"
          stroke="#000000"
          stroke-width="1.2"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <style>
      [data-composition-id="act1-late-sfx"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        font-family: "Space Mono", ui-monospace, monospace;
      }
      [data-composition-id="act1-late-sfx"] .stage {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(1200px 800px at 50% 52%, #1b1b1f 0%, #0b0b0d 70%),
          #0b0b0d;
      }
      [data-composition-id="act1-late-sfx"] .grain {
        position: absolute;
        inset: 0;
        opacity: 0.06;
        pointer-events: none;
        background-image:
          repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 3px);
        mix-blend-mode: overlay;
      }

      [data-composition-id="act1-late-sfx"] .label-top,
      [data-composition-id="act1-late-sfx"] .label-bottom {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #7a7a7a;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        font-size: 22px;
        font-weight: 500;
      }
      [data-composition-id="act1-late-sfx"] .label-top { top: 120px; }
      [data-composition-id="act1-late-sfx"] .label-bottom { bottom: 120px; letter-spacing: 0.3em; }

      [data-composition-id="act1-late-sfx"] .button-wrap {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 560px;
        height: 560px;
        transform: translate(-50%, -50%);
      }
      [data-composition-id="act1-late-sfx"] .button-shadow {
        position: absolute;
        inset: 30px 0 0 0;
        border-radius: 50%;
        background: #6b0a07;
        filter: blur(1px);
      }
      [data-composition-id="act1-late-sfx"] .button-ring {
        position: absolute;
        inset: -26px;
        border-radius: 50%;
        border: 4px dashed rgba(255, 214, 10, 0.55);
      }
      [data-composition-id="act1-late-sfx"] .button {
        position: absolute;
        inset: 0 0 24px 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 42% 32%, #ff6b60 0%, #ff3b30 45%, #d0271e 100%);
        box-shadow:
          inset 0 -26px 40px rgba(0, 0, 0, 0.3),
          inset 0 14px 30px rgba(255, 255, 255, 0.18),
          0 0 0 6px rgba(255, 59, 48, 0.08);
        color: #fff8f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        will-change: transform;
      }
      [data-composition-id="act1-late-sfx"] .speaker {
        width: 96px;
        height: 96px;
        opacity: 0.95;
      }
      [data-composition-id="act1-late-sfx"] .button-text {
        font-family: "Archivo Black", "Space Mono", sans-serif;
        font-size: 108px;
        font-weight: 900;
        letter-spacing: 0.02em;
        color: #fff8f6;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
      }

      [data-composition-id="act1-late-sfx"] .ring {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 560px;
        height: 560px;
        margin: -280px 0 0 -280px;
        border-radius: 50%;
        border: 6px solid #ffd60a;
        opacity: 0;
        pointer-events: none;
      }
      [data-composition-id="act1-late-sfx"] .ring-2 {
        border-color: #ff3b30;
        border-width: 4px;
      }
      [data-composition-id="act1-late-sfx"] .honk-burst {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        pointer-events: none;
      }
      [data-composition-id="act1-late-sfx"] .honk-word {
        font-family: "Archivo Black", sans-serif;
        font-size: 180px;
        font-weight: 900;
        color: #ffd60a;
        letter-spacing: -0.02em;
        text-shadow:
          6px 6px 0 #ff3b30,
          -2px -2px 0 #ffffff;
        transform: rotate(-6deg);
      }

      [data-composition-id="act1-late-sfx"] .cursor {
        position: absolute;
        width: 48px;
        height: 48px;
        left: 0;
        top: 0;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        will-change: transform;
        z-index: 10;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const scope = document.querySelector('[data-composition-id="act1-late-sfx"]');
        const q = (s) => scope.querySelector(s);

        const tl = gsap.timeline({ paused: true });

        // Idle: soft bob on the button
        gsap.set(q(".button"), { transformOrigin: "50% 60%" });
        gsap.set(q(".cursor"), { x: 1680, y: 980 });
        gsap.set(q(".button-ring"), { rotation: 0, transformOrigin: "50% 50%" });

        // Labels fade in
        tl.from(q(".label-top"), { opacity: 0, y: -10, duration: 0.5, ease: "power1.out" }, 0.1)
          .from(q(".label-bottom"), { opacity: 0, y: 10, duration: 0.5, ease: "power1.out" }, 0.2);

        // Button enters with a little pop
        tl.from(q(".button-wrap"), {
          scale: 0.86,
          opacity: 0,
          duration: 0.55,
          ease: "back.out(1.8)"
        }, 0.15);

        // Ambient bob on button during wait
        tl.to(q(".button"), {
          y: -8,
          duration: 0.9,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 1
        }, 0.3);

        // Ring slow spin
        tl.to(q(".button-ring"), { rotation: 12, duration: 2.2, ease: "none" }, 0.1);

        // Cursor glide up to center-left of button
        tl.to(q(".cursor"), {
          x: 960,
          y: 540,
          duration: 0.95,
          ease: "power2.inOut"
        }, 0.45);

        // Cursor hover wiggle
        tl.to(q(".cursor"), {
          x: 972, y: 548,
          duration: 0.18,
          ease: "sine.inOut"
        }, 1.5);

        // ---- CLICK at t = 1.72 ----
        const clickT = 1.72;

        // Cursor press indicator
        tl.to(q(".cursor"), {
          scale: 0.82,
          duration: 0.06,
          ease: "power2.out",
          transformOrigin: "0% 0%"
        }, clickT);
        tl.to(q(".cursor"), {
          scale: 1,
          duration: 0.14,
          ease: "power2.out",
          transformOrigin: "0% 0%"
        }, clickT + 0.06);

        // Button visually reacts IMMEDIATELY on click
        tl.to(q(".button"), {
          y: 14,
          scale: 0.96,
          duration: 0.06,
          ease: "power3.out"
        }, clickT);
        tl.to(q(".button"), {
          y: 0,
          scale: 1,
          duration: 0.22,
          ease: "back.out(2.2)"
        }, clickT + 0.06);

        // Tiny white flash on button face
        tl.fromTo(q(".button"), { filter: "brightness(1)" }, {
          filter: "brightness(1.35)",
          duration: 0.05,
          ease: "power2.out"
        }, clickT);
        tl.to(q(".button"), {
          filter: "brightness(1)",
          duration: 0.2,
          ease: "power2.in"
        }, clickT + 0.05);

        // Button settles... beat of silence... (0.28s later)
        const lateT = clickT + 0.28;

        // Shockwave rings
        tl.fromTo(q(".ring-1"),
          { scale: 0.4, opacity: 0.85 },
          { scale: 1.8, opacity: 0, duration: 0.7, ease: "power2.out" },
          lateT
        );
        tl.fromTo(q(".ring-2"),
          { scale: 0.4, opacity: 0.7 },
          { scale: 2.2, opacity: 0, duration: 0.85, ease: "power2.out" },
          lateT + 0.08
        );

        // HONK! comic burst
        tl.fromTo(q(".honk-burst"),
          { opacity: 0, scale: 0.3, rotation: -18 },
          { opacity: 1, scale: 1, rotation: -6, duration: 0.22, ease: "back.out(2.6)" },
          lateT
        );
        tl.to(q(".honk-burst"), {
          opacity: 0,
          scale: 1.12,
          duration: 0.5,
          ease: "power2.in"
        }, lateT + 0.55);

        // Keep cursor parked on the button while burst plays
        tl.to(q(".cursor"), { x: 974, y: 548, duration: 0.01 }, clickT + 0.4);

        // Pad to 4s so HF visibility doesn't cut early
        tl.to({}, { duration: 4 }, 0);

        window.__timelines["act1-late-sfx"] = tl;
      })();
    </script>
  </div>
</template>

<!-- hyperframes-harness: standalone play/scrub (+ optional autoplay/loop) for a paused
     GSAP composition. Handles both full-doc and <template>-wrapped compositions.
     Modes via URL query: ?autoplay=1  ?loop=1  ?chrome=0 (hide controls). -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness.hf-hidden { display: none; }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness button.hf-on { background: #6c7cff; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <button id="hf-loop" title="Loop">&#8635;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  var Q = new URLSearchParams(location.search);
  var WANT_AUTOPLAY = Q.get('autoplay') === '1';
  var WANT_LOOP = Q.get('loop') === '1';
  var WANT_CHROME = Q.get('chrome') !== '0';

  // GSAP must be a global before ANY composition script runs (template comps call
  // gsap at parse-time). Compositions load their own gsap from CDN, but to make
  // activation order-independent we ensure window.gsap exists first.
  function ensureGsap(cb) {
    if (window.gsap) return cb();
    // is the composition already loading a gsap <script src>? wait briefly for it.
    var waited = 0;
    (function poll() {
      if (window.gsap) return cb();
      if (waited > 1500) {  // inject our own as a fallback
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js';
        s.onload = cb; s.onerror = cb;
        document.head.appendChild(s);
        return;
      }
      waited += 60; setTimeout(poll, 60);
    })();
  }

  // Clone a <template> composition into a live stage. Cloned <script> tags are inert,
  // so recreate each one; external (src) scripts must finish before later inline
  // scripts run, so inject sequentially awaiting each src load.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done();
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++)
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      s.textContent = old.textContent;
      if (old.src) {
        s.onload = s.onerror = function () { next(i + 1); };
        old.parentNode.replaceChild(s, old);
      } else {
        old.parentNode.replaceChild(s, old); // inline runs synchronously on insert
        next(i + 1);
      }
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 80) return;
      return setTimeout(function () { boot((tries || 0) + 1); }, 60);
    }
    if (!id) id = Object.keys(tls)[0];

    var bar = document.getElementById('hf-harness');
    if (!WANT_CHROME) bar.classList.add('hf-hidden');

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var loopBtn = document.getElementById('hf-loop');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    var looping = WANT_LOOP;
    if (looping) loopBtn.classList.add('hf-on');

    // Track play state ourselves — GSAP's isActive() is unreliable right after load
    // (caused the "click play twice" bug), so don't derive UI/toggle from it.
    var playing = false;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);

    var LOOP_HOLD = 1000;          // hold on the last frame this long before looping
    var holdTimer = null;
    function cancelHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } }
    function play() { cancelHold(); if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); playing = true; }
    function pause() { cancelHold(); tl.pause(); playing = false; }
    tl.eventCallback('onComplete', function () {
      if (!looping) { playing = false; return; }
      tl.pause();                 // sit on the final frame for a beat, then restart
      holdTimer = setTimeout(function () { holdTimer = null; if (looping && playing) { tl.time(0); tl.play(); } }, LOOP_HOLD);
    });

    playBtn.onclick = function () { playing ? pause() : play(); };
    restart.onclick = function () { tl.time(0); play(); };
    loopBtn.onclick = function () { looping = !looping; loopBtn.classList.toggle('hf-on', looping);
      if (looping && !playing) play(); };
    scrub.oninput = function () { pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - (WANT_CHROME ? 56 : 0);
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
    if (WANT_AUTOPLAY) play();
  }

  function start() { ensureGsap(function () { activateTemplate(function () { boot(0); }); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body></html>
