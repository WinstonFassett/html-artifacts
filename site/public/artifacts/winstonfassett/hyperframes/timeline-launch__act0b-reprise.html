<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>act0b-reprise — Hyperframes</title></head>
<body>
<template id="act0b-reprise-template">
  <div data-composition-id="act0b-reprise" data-width="1920" data-height="1080" data-start="0" data-duration="2.5">
    <div class="canvas">
      <div class="final-row">
        <span class="word final" id="w-timing">timing</span>
        <span class="word final" id="w-is">is</span>
        <span class="bell-slot" id="bell">
          <span class="ring ring-2"></span>
          <span class="ring"></span>
          <span class="bell-main" id="bell-main">
            <span class="bell-lottie" id="bell-lottie"></span>
          </span>
        </span>
        <span class="word final" id="w-tricky">tricky.</span>
      </div>
    </div>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=block');

      [data-composition-id="act0b-reprise"] {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        background: #f5f5f7; color: #1d1d1f;
        font-family: "Inter", -apple-system, sans-serif;
      }
      [data-composition-id="act0b-reprise"] .canvas {
        position: absolute; inset: 0; background: #f5f5f7;
      }
      [data-composition-id="act0b-reprise"] .final-row {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        display: flex; align-items: center;
        gap: 56px; white-space: nowrap;
      }
      [data-composition-id="act0b-reprise"] .word {
        font-size: 150px; font-weight: 900;
        letter-spacing: -0.035em; line-height: 1;
        color: #1d1d1f; flex-shrink: 0;
        opacity: 0;
      }
      [data-composition-id="act0b-reprise"] .bell-slot {
        display: inline-flex; align-items: center; justify-content: center;
        width: 0; height: 280px;
        flex-shrink: 0; overflow: visible;
        opacity: 0; position: relative;
        margin: 0 -28px;
      }
      [data-composition-id="act0b-reprise"] .bell-main {
        position: relative; width: 280px; height: 280px; display: flex;
        transform-origin: 50% 50%;
      }
      [data-composition-id="act0b-reprise"] .bell-lottie {
        width: 100%; height: 100%; display: block;
        filter: drop-shadow(0 10px 18px rgba(29,29,31,0.18));
      }
      [data-composition-id="act0b-reprise"] .bell-lottie svg {
        width: 100%; height: 100%; display: block;
      }
      [data-composition-id="act0b-reprise"] .ring {
        position: absolute; left: 50%; top: 50%;
        width: 364px; height: 364px;
        margin: -182px 0 0 -182px;
        border-radius: 50%;
        border: 3px solid rgba(29, 29, 31, 0.25);
        opacity: 0; transform: scale(0.4);
      }
      [data-composition-id="act0b-reprise"] .ring-2 { border-color: rgba(29, 29, 31, 0.10); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.14/lottie.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (async function () {
        const scope = document.querySelector('[data-composition-id="act0b-reprise"]');
        const q = (s) => scope.querySelector(s);
        const qa = (s) => Array.from(scope.querySelectorAll(s));

        if (document.fonts && document.fonts.ready) await document.fonts.ready;
        for (let i = 0; i < 40 && typeof window.lottie === 'undefined'; i++) {
          await new Promise(r => setTimeout(r, 50));
        }

        const bellLottieEl = q('#bell-lottie');
        const bellMain = q('#bell-main');
        const bellSlot = q('#bell');
        const wTiming = q('#w-timing');
        const wIs = q('#w-is');
        const wTricky = q('#w-tricky');
        const rings = qa('.ring');

        let setBellFrame = () => {};
        if (typeof window.lottie !== 'undefined') {
          try {
            const resp = await fetch('assets/bell.json');
            const outer = await resp.json();
            const animationData = (outer && typeof outer.content === 'string') ? JSON.parse(outer.content) : outer;
            const bellAnim = window.lottie.loadAnimation({
              container: bellLottieEl,
              renderer: 'svg',
              loop: false,
              autoplay: false,
              animationData
            });
            const originalGoToAndStop = bellAnim.goToAndStop.bind(bellAnim);
            setBellFrame = (f) => { try { originalGoToAndStop(f, true); } catch (e) {} };
            bellAnim.goToAndStop = function () { /* no-op: HF auto-seek disabled */ };
            bellAnim.addEventListener('DOMLoaded', () => setBellFrame(0));
          } catch (e) {}
        }

        const tl = gsap.timeline({ paused: true });

        // Initial state — trio hidden, line positioned at center via CSS
        gsap.set([wTiming, wIs, wTricky], { opacity: 0 });
        gsap.set(bellSlot, { width: 0, opacity: 0 });
        gsap.set(bellMain, { scale: 0.4, rotation: -8, opacity: 0 });
        gsap.set(rings, { scale: 0.4, opacity: 0 });

        // Snap-reveal the trio all at once
        tl.to([wTiming, wIs, wTricky], {
          opacity: 1, duration: 0.25, ease: "power2.out"
        }, 0.1);

        // Split begins immediately — VO says "timing is tricky" during this window
        const splitT = 0.6;
        tl.to(bellSlot, {
          width: 280, opacity: 1,
          duration: 0.4, ease: "power3.out"
        }, splitT);

        tl.to(bellMain, {
          scale: 1, rotation: 0, opacity: 1,
          duration: 0.3, ease: "back.out(2.2)"
        }, splitT + 0.1);

        // Bell shake via Lottie frames
        const bellFrame = { frame: 0 };
        tl.to(bellFrame, {
          frame: 140,
          duration: 1.3,
          ease: "none",
          onUpdate: () => setBellFrame(bellFrame.frame)
        }, splitT + 0.15);

        // Ring halo tween removed — keep rings hidden
        gsap.set(rings, { opacity: 0 });

        tl.to({}, { duration: 2.5 }, 0);
        window.__timelines["act0b-reprise"] = tl;
      })();
    </script>
  </div>
</template>

<!-- hyperframes-harness: standalone play/scrub for a paused GSAP composition.
     Handles both full-doc compositions and <template>-wrapped ones. -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  // If the composition is wrapped in a <template>, clone it into a live stage.
  // Cloned <script> tags don't execute, so we recreate each one. External
  // (src) scripts must finish loading before later inline scripts run, so we
  // inject sequentially, awaiting each external script's load event.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done(); // already live
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++) {
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      }
      s.textContent = old.textContent;
      if (old.src) { s.onload = s.onerror = function () { next(i + 1); }; }
      old.parentNode.replaceChild(s, old);
      if (!old.src) next(i + 1); // inline scripts run synchronously on insert
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 60) return;       // give CDN scripts ~5s
      return setTimeout(function () { boot((tries || 0) + 1); }, 80);
    }
    if (!id) id = Object.keys(tls)[0];

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = tl.isActive() ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);
    playBtn.onclick = function () {
      if (tl.isActive()) tl.pause();
      else { if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); }
    };
    restart.onclick = function () { tl.pause(); tl.time(0); sync(); };
    scrub.oninput = function () { tl.pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - 56;
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
  }
  function start() { activateTemplate(function () { boot(0); }); }
  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body></html>
