<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>engine — Hyperframes</title></head>
<body>
<template id="engine-template">
  <div
    data-composition-id="engine"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="10.68"
  >
    <div class="eng-bg"></div>

    <div class="eng-wrap">

    <!-- Tall vertical canvas — camera pans down -->
    <div class="eng-canvas">

      <!-- ═══ STEP 1: AGENT (centered at y:540) ═══ -->
      <div class="step step-1">
        <div class="step-icon si-1">
          <div class="si-ring si-ring-o"></div>
          <div class="si-ring si-ring-i"></div>
          <div class="si-core">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <circle cx="40" cy="26" r="10" fill="currentColor"/>
              <path d="M18 60c0-12 10-22 22-22s22 10 22 22" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              <path d="M52 16l6-6M56 24l6 0M54 32l6 3" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            </svg>
          </div>
        </div>
        <div class="step-title">Agent</div>
        <div class="step-sub">writes HTML</div>
      </div>

      <!-- Flow connector 1→2 -->
      <svg class="flow-svg flow-1" viewBox="0 0 4 700" xmlns="http://www.w3.org/2000/svg">
        <line class="fl" x1="2" y1="0" x2="2" y2="700" stroke="currentColor" stroke-width="3" stroke-dasharray="8 8"/>
      </svg>
      <div class="flow-pip fp-1"></div>

      <!-- ═══ STEP 2: RENDERER (centered at y:2000) ═══ -->
      <div class="step step-2">
        <div class="step-icon si-2">
          <div class="si-ring si-ring-o"></div>
          <div class="si-ring si-ring-i"></div>
          <div class="si-core">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <circle cx="40" cy="40" r="26" fill="none" stroke="currentColor" stroke-width="4"/>
              <circle cx="40" cy="40" r="14" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"/>
              <circle cx="40" cy="40" r="5" fill="currentColor"/>
              <line x1="40" y1="6" x2="40" y2="16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="40" y1="64" x2="40" y2="74" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="6" y1="40" x2="16" y2="40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="64" y1="40" x2="74" y2="40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <div class="step-title">Renderer</div>
        <div class="step-sub">captures every frame</div>
      </div>

      <!-- Flow connector 2→3 -->
      <svg class="flow-svg flow-2" viewBox="0 0 4 700" xmlns="http://www.w3.org/2000/svg">
        <line class="fl" x1="2" y1="0" x2="2" y2="700" stroke="currentColor" stroke-width="3" stroke-dasharray="8 8"/>
      </svg>
      <div class="flow-pip fp-2"></div>

      <!-- ═══ STEP 3: MP4 (centered at y:3460) ═══ -->
      <div class="step step-3">
        <div class="step-icon si-3">
          <div class="si-ring si-ring-o"></div>
          <div class="si-ring si-ring-i"></div>
          <div class="si-core">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="10" width="60" height="60" rx="12" fill="none" stroke="currentColor" stroke-width="4"/>
              <path d="M32 24L56 40L32 56Z" fill="currentColor"/>
            </svg>
          </div>
        </div>
        <div class="step-title">MP4</div>
        <div class="step-sub">ready to ship</div>
      </div>

      <!-- ═══ DETERMINISTIC (centered at y:4920) ═══ -->
      <div class="det">
        <!-- Large centered frame that duplicates -->
        <div class="det-hero">
          <div class="det-card det-card-back">
            <div class="det-scr">
              <div class="det-hbar"></div>
              <div class="det-row"><div class="det-sq"></div><div class="det-ln dln1"></div></div>
              <div class="det-row"><div class="det-circ"></div><div class="det-ln dln2"></div></div>
              <div class="det-row"><div class="det-tri"></div><div class="det-ln dln3"></div></div>
              <div class="det-wv"></div>
            </div>
          </div>
          <div class="det-card det-card-front">
            <div class="det-scr">
              <div class="det-hbar"></div>
              <div class="det-row"><div class="det-sq"></div><div class="det-ln dln1"></div></div>
              <div class="det-row"><div class="det-circ"></div><div class="det-ln dln2"></div></div>
              <div class="det-row"><div class="det-tri"></div><div class="det-ln dln3"></div></div>
              <div class="det-wv"></div>
            </div>
          </div>
        </div>
        <div class="det-word">Deterministic.</div>
        <div class="det-proof">
          <svg class="det-chk" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" fill="#81B29A"/>
            <path d="M12 20l6 6 10-10" fill="none" stroke="#F4F1DE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="det-proof-text">Identical output, every time.</span>
        </div>
      </div>

    </div><!-- /.eng-canvas -->
    </div><!-- /.eng-wrap -->

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap");

      [data-composition-id="engine"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F4F1DE;
      }
      [data-composition-id="engine"] .eng-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 30%, rgba(255,252,240,0.6) 0%, transparent 50%),
          linear-gradient(180deg, #F4F1DE 0%, #ece8d2 100%);
      }
      [data-composition-id="engine"] .eng-wrap {
        position: absolute; inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="engine"] .eng-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 6000px;
        will-change: transform;
      }

      /* ─── Steps ─── */
      [data-composition-id="engine"] .step {
        position: absolute;
        left: 50%; width: 900px; margin-left: -450px;
        display: flex; flex-direction: column; align-items: center; gap: 32px;
      }
      [data-composition-id="engine"] .step-1 { top: 360px; }
      [data-composition-id="engine"] .step-2 { top: 1820px; }
      [data-composition-id="engine"] .step-3 { top: 3280px; }

      /* Icon: 360px with concentric rings */
      [data-composition-id="engine"] .step-icon {
        position: relative; width: 360px; height: 360px;
      }
      [data-composition-id="engine"] .si-ring {
        position: absolute; border-radius: 50%;
      }
      [data-composition-id="engine"] .si-ring-o {
        inset: 0; border: 2.5px solid currentColor; opacity: 0.12;
      }
      [data-composition-id="engine"] .si-ring-i {
        inset: 36px; border: 2px dashed currentColor; opacity: 0.2;
      }
      [data-composition-id="engine"] .si-core {
        position: absolute; inset: 72px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 16px 48px rgba(0,0,0,0.1);
      }
      [data-composition-id="engine"] .si-core svg { width: 100px; height: 100px; }

      /* Step colors */
      [data-composition-id="engine"] .si-1 { color: #3D405B; }
      [data-composition-id="engine"] .si-1 .si-core { background: #eaeaf2; }
      [data-composition-id="engine"] .si-2 { color: #E07A5F; }
      [data-composition-id="engine"] .si-2 .si-core { background: #fef0eb; }
      [data-composition-id="engine"] .si-3 { color: #81B29A; }
      [data-composition-id="engine"] .si-3 .si-core { background: #eaf5ef; }

      [data-composition-id="engine"] .step-title {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: 96px;
        color: #3D405B;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      [data-composition-id="engine"] .step-sub {
        font-family: "JetBrains Mono", monospace;
        font-weight: 400;
        font-size: 28px;
        color: #E07A5F;
        letter-spacing: 0.06em;
      }

      /* ─── Flow connectors ─── */
      [data-composition-id="engine"] .flow-svg {
        position: absolute; left: 50%; margin-left: -2px;
        width: 4px; height: 700px; color: #c8c0a8;
      }
      /* Lines start at bottom of icon (step top + 360 icon + 32 gap) and run to next step */
      [data-composition-id="engine"] .flow-1 { top: 920px; }
      [data-composition-id="engine"] .flow-2 { top: 2380px; }
      [data-composition-id="engine"] .fl { stroke-dasharray: 700; stroke-dashoffset: 700; }

      [data-composition-id="engine"] .flow-pip {
        position: absolute; left: 50%; margin-left: -10px;
        width: 20px; height: 20px; border-radius: 50%;
        background: #E07A5F; opacity: 0;
      }
      [data-composition-id="engine"] .fp-1 { top: 1610px; }
      [data-composition-id="engine"] .fp-2 { top: 3070px; }

      /* ─── Deterministic ─── */
      [data-composition-id="engine"] .det {
        position: absolute; top: 4400px;
        left: 50%; width: 1400px; margin-left: -700px;
        display: flex; flex-direction: column; align-items: center; gap: 48px;
      }

      [data-composition-id="engine"] .det-hero {
        position: relative;
        width: 640px; height: 420px;
      }
      [data-composition-id="engine"] .det-card {
        position: absolute;
        width: 640px; height: 420px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,0.15);
        border: 2px solid rgba(61,64,91,0.1);
        will-change: transform;
      }
      [data-composition-id="engine"] .det-card-back { z-index: 1; }
      [data-composition-id="engine"] .det-card-front { z-index: 2; }

      [data-composition-id="engine"] .det-scr {
        width: 100%; height: 100%;
        background: #2a2a30;
        padding: 32px;
        box-sizing: border-box;
      }
      [data-composition-id="engine"] .det-hbar {
        width: 50%; height: 14px;
        background: #E07A5F;
        border-radius: 7px;
        margin-bottom: 28px;
      }
      [data-composition-id="engine"] .det-row {
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 20px;
      }
      [data-composition-id="engine"] .det-sq {
        width: 32px; height: 32px;
        background: #81B29A;
        border-radius: 6px;
        flex-shrink: 0;
      }
      [data-composition-id="engine"] .det-circ {
        width: 32px; height: 32px;
        background: #F2CC8F;
        border-radius: 50%;
        flex-shrink: 0;
      }
      [data-composition-id="engine"] .det-tri {
        width: 0; height: 0;
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-bottom: 28px solid #E07A5F;
        flex-shrink: 0;
      }
      [data-composition-id="engine"] .det-ln {
        height: 10px; border-radius: 5px;
        background: rgba(255,255,255,0.12);
      }
      [data-composition-id="engine"] .dln1 { width: 75%; }
      [data-composition-id="engine"] .dln2 { width: 55%; }
      [data-composition-id="engine"] .dln3 { width: 65%; }
      [data-composition-id="engine"] .det-wv {
        margin-top: 20px;
        height: 24px;
        background:
          repeating-linear-gradient(90deg,
            rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 6px,
            transparent 6px, transparent 10px);
        border-radius: 4px;
      }

      [data-composition-id="engine"] .det-word {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: 120px;
        color: #3D405B;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      [data-composition-id="engine"] .det-proof {
        display: flex; align-items: center; gap: 16px;
        padding: 14px 32px;
        background: rgba(129,178,154,0.1);
        border: 2px solid rgba(129,178,154,0.25);
        border-radius: 14px;
      }
      [data-composition-id="engine"] .det-chk { width: 40px; height: 40px; }
      [data-composition-id="engine"] .det-proof-text {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 28px;
        color: #3D405B;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="engine"]');

        var wrap = root.querySelector(".eng-wrap");
        var canvas = root.querySelector(".eng-canvas");
        var steps = root.querySelectorAll(".step");
        var flowLines = root.querySelectorAll(".fl");
        var flowPips = root.querySelectorAll(".flow-pip");
        var detWord = root.querySelector(".det-word");
        var detHero = root.querySelector(".det-hero");
        var cardFront = root.querySelector(".det-card-front");
        var cardBack = root.querySelector(".det-card-back");
        var detProof = root.querySelector(".det-proof");

        // --- Cut-the-curve upward entry (0 → 1.0s) ---
        gsap.set(wrap, { y: 150, filter: "blur(30px)" });
        tl.to(wrap, { y: 0, filter: "blur(0px)", duration: 1.0, ease: "power2.out" }, 0);

        // Initial states
        steps.forEach(function (s) { gsap.set(s, { opacity: 0, y: 80, scale: 0.88 }); });
        gsap.set(detWord, { opacity: 0, y: 40, scale: 0.9 });
        gsap.set(detHero, { opacity: 1, scale: 1 });
        gsap.set(detProof, { opacity: 0, y: 20 });

        // Cards stacked (front on top of back, identical position)
        gsap.set(cardFront, { x: 0, rotation: 0 });
        gsap.set(cardBack, { x: 0, rotation: 0 });

        // Canvas y places icon center at viewport center.
        // Icon center = step_top + 180. Viewport center = 540.
        // Step 1: 360 + 180 = 540. Canvas y = -540 + 540 = 0
        gsap.set(canvas, { y: 0 });

        // Ring rotations (continuous)
        root.querySelectorAll(".si-ring-o").forEach(function (r) {
          tl.to(r, { rotation: 360, duration: 10.68, ease: "none", transformOrigin: "50% 50%" }, 0);
        });
        root.querySelectorAll(".si-ring-i").forEach(function (r) {
          tl.to(r, { rotation: -360, duration: 10.68, ease: "none", transformOrigin: "50% 50%" }, 0);
        });

        // ═══ STEP 1: "Agent writes HTML" (0.3 → 1.8s) ═══
        tl.to(steps[0], { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }, 0.3);

        // ═══ PAN TO STEP 2 + connector (1.5 → 3.2s) ═══
        tl.to(flowLines[0], { strokeDashoffset: 0, duration: 0.7, ease: "power1.inOut" }, 1.5);
        tl.to(flowPips[0], { opacity: 1, duration: 0.2, ease: "power2.out" }, 2.0);

        // Step 2 icon center: 1820 + 180 = 2000. Canvas y = -2000 + 540 = -1460
        tl.to(canvas, { y: -1460, duration: 1.2, ease: "power2.inOut" }, 1.8);
        tl.to(steps[1], { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }, 2.5);

        // ═══ CONTINUOUS PAN: Renderer → MP4 (slide-through) → Det (3.2 → 4.8s) ═══
        // Flow line 2 draws during pan
        tl.to(flowLines[1], { strokeDashoffset: 0, duration: 0.7, ease: "power1.inOut" }, 3.2);
        tl.to(flowPips[1], { opacity: 1, duration: 0.2, ease: "power2.out" }, 3.7);

        // MP4 reveals mid-pan — slides through, camera doesn't park
        tl.to(steps[2], { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "expo.out" }, 3.8);

        // One continuous pan from Renderer (-1460) all the way to Det (-4310)
        // Det center ≈ 4400 + 450 = 4850. Canvas y = -4850 + 540 = -4310
        tl.to(canvas, { y: -4310, duration: 2.3, ease: "power2.inOut" }, 3.3);

        // ═══ DETERMINISTIC — synced to VO "Deterministic." at 5.28s local ═══
        // "Deterministic." word lands on the VO cue
        tl.to(detWord, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "expo.out" }, 5.2);

        // Card splits — reveals identical copies
        tl.to(cardFront, { x: 180, rotation: 3, duration: 0.7, ease: "power2.out" }, 6.0);
        tl.to(cardBack, { x: -180, rotation: -3, duration: 0.7, ease: "power2.out" }, 6.0);

        // "Identical output, every time." badge — syncs with VO at 7.12s local
        tl.to(detProof, { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.4)" }, 7.0);

        // ═══ HOLD + EXIT (9.5 → 10.68s) ═══
        // Cards gently breathe
        tl.to(cardFront, { y: -6, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 9.2);
        tl.to(cardBack, { y: 6, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 9.2);

        // Cut-the-curve upward exit
        tl.to(wrap, {
          y: -150, filter: "blur(30px)",
          duration: 0.33, ease: "power2.in"
        }, 10.35);

        window.__timelines["engine"] = tl;
      })();
    </script>
  </div>
</template>

<!-- hyperframes-harness: standalone play/scrub (+ optional autoplay/loop) for a paused
     GSAP composition. Handles both full-doc and <template>-wrapped compositions.
     Modes via URL query: ?autoplay=1  ?loop=1  ?chrome=0 (hide controls). -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }
  #hf-stage { position: absolute; top: 0; left: 0; }
  #hf-harness {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483647;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    background: rgba(12, 12, 20, 0.82); color: #e6e6ee;
    backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.08);
  }
  #hf-harness.hf-hidden { display: none; }
  #hf-harness button {
    all: unset; cursor: pointer; width: 34px; height: 34px;
    display: grid; place-items: center; border-radius: 8px;
    background: #2a2a3a; color: #fff; font-size: 15px;
  }
  #hf-harness button:hover { background: #3a3a52; }
  #hf-harness button.hf-on { background: #6c7cff; }
  #hf-harness input[type=range] { flex: 1; accent-color: #6c7cff; }
  #hf-harness .hf-time { font-variant-numeric: tabular-nums; opacity: 0.7; min-width: 92px; }
  #hf-harness .hf-id { opacity: 0.5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
<div id="hf-harness">
  <button id="hf-play" title="Play / pause">&#9654;</button>
  <button id="hf-restart" title="Restart">&#8634;</button>
  <button id="hf-loop" title="Loop">&#8635;</button>
  <input id="hf-scrub" type="range" min="0" max="1000" value="0" />
  <span class="hf-time">0.00 / 0.00s</span>
  <span class="hf-id"></span>
</div>
<script>
(function () {
  var Q = new URLSearchParams(location.search);
  var WANT_AUTOPLAY = Q.get('autoplay') === '1';
  var WANT_LOOP = Q.get('loop') === '1';
  var WANT_CHROME = Q.get('chrome') !== '0';

  // GSAP must be a global before ANY composition script runs (template comps call
  // gsap at parse-time). Compositions load their own gsap from CDN, but to make
  // activation order-independent we ensure window.gsap exists first.
  function ensureGsap(cb) {
    if (window.gsap) return cb();
    // is the composition already loading a gsap <script src>? wait briefly for it.
    var waited = 0;
    (function poll() {
      if (window.gsap) return cb();
      if (waited > 1500) {  // inject our own as a fallback
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js';
        s.onload = cb; s.onerror = cb;
        document.head.appendChild(s);
        return;
      }
      waited += 60; setTimeout(poll, 60);
    })();
  }

  // Clone a <template> composition into a live stage. Cloned <script> tags are inert,
  // so recreate each one; external (src) scripts must finish before later inline
  // scripts run, so inject sequentially awaiting each src load.
  function activateTemplate(done) {
    if (document.querySelector('[data-composition-id]')) return done();
    var tpl = document.querySelector('template');
    if (!tpl) return done();
    var stage = document.createElement('div');
    stage.id = 'hf-stage';
    stage.appendChild(tpl.content.cloneNode(true));
    document.body.insertBefore(stage, document.getElementById('hf-harness'));

    var scripts = [].slice.call(stage.querySelectorAll('script'));
    (function next(i) {
      if (i >= scripts.length) return done();
      var old = scripts[i];
      var s = document.createElement('script');
      for (var j = 0; j < old.attributes.length; j++)
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      s.textContent = old.textContent;
      if (old.src) {
        s.onload = s.onerror = function () { next(i + 1); };
        old.parentNode.replaceChild(s, old);
      } else {
        old.parentNode.replaceChild(s, old); // inline runs synchronously on insert
        next(i + 1);
      }
    })(0);
  }

  function boot(tries) {
    var tls = window.__timelines || {};
    var root = document.querySelector('[data-composition-id]');
    var id = root && root.getAttribute('data-composition-id');
    var tl = (id && tls[id]) || tls[Object.keys(tls)[0]];
    if (!tl || !root) {
      if ((tries || 0) > 80) return;
      return setTimeout(function () { boot((tries || 0) + 1); }, 60);
    }
    if (!id) id = Object.keys(tls)[0];

    var bar = document.getElementById('hf-harness');
    if (!WANT_CHROME) bar.classList.add('hf-hidden');

    var dur = tl.duration() || parseFloat(root.getAttribute('data-duration') || '5');
    var playBtn = document.getElementById('hf-play');
    var restart = document.getElementById('hf-restart');
    var loopBtn = document.getElementById('hf-loop');
    var scrub = document.getElementById('hf-scrub');
    var timeEl = document.querySelector('#hf-harness .hf-time');
    document.querySelector('#hf-harness .hf-id').textContent = id;

    var looping = WANT_LOOP;
    if (looping) loopBtn.classList.add('hf-on');

    // Track play state ourselves — GSAP's isActive() is unreliable right after load
    // (caused the "click play twice" bug), so don't derive UI/toggle from it.
    var playing = false;

    function fmt(t) { return t.toFixed(2) + ' / ' + dur.toFixed(2) + 's'; }
    function sync() {
      scrub.value = String(Math.round((tl.time() / dur) * 1000));
      timeEl.textContent = fmt(tl.time());
      playBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    }
    gsap.ticker.add(sync);

    var LOOP_HOLD = 1000;          // hold on the last frame this long before looping
    var holdTimer = null;
    function cancelHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } }
    function play() { cancelHold(); if (tl.time() >= dur - 0.01) tl.time(0); tl.play(); playing = true; }
    function pause() { cancelHold(); tl.pause(); playing = false; }
    tl.eventCallback('onComplete', function () {
      if (!looping) { playing = false; return; }
      tl.pause();                 // sit on the final frame for a beat, then restart
      holdTimer = setTimeout(function () { holdTimer = null; if (looping && playing) { tl.time(0); tl.play(); } }, LOOP_HOLD);
    });

    playBtn.onclick = function () { playing ? pause() : play(); };
    restart.onclick = function () { tl.time(0); play(); };
    loopBtn.onclick = function () { looping = !looping; loopBtn.classList.toggle('hf-on', looping);
      if (looping && !playing) play(); };
    scrub.oninput = function () { pause(); tl.time((scrub.value / 1000) * dur); };

    function fit() {
      var w = parseFloat(root.getAttribute('data-width')) || 1920;
      var h = parseFloat(root.getAttribute('data-height')) || 1080;
      var avail = window.innerHeight - (WANT_CHROME ? 56 : 0);
      var s = Math.min(window.innerWidth / w, avail / h);
      var host = document.getElementById('hf-stage') || root;
      host.style.transformOrigin = 'top left';
      host.style.transform = 'scale(' + s + ')';
      host.style.position = 'absolute';
      host.style.left = ((window.innerWidth - w * s) / 2) + 'px';
      host.style.top = ((avail - h * s) / 2) + 'px';
      host.style.width = w + 'px'; host.style.height = h + 'px';
    }
    fit(); window.addEventListener('resize', fit);
    sync();
    if (WANT_AUTOPLAY) play();
  }

  function start() { ensureGsap(function () { activateTemplate(function () { boot(0); }); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>

</body></html>
