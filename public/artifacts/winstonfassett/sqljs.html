<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL.js — SQLite in the browser</title>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1/dist/sql-wasm.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 100px; font-family: ui-monospace, monospace; font-size: 14px; padding: 0.5rem; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #4ade80; cursor: pointer; margin: 0.5rem 0; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; font-size: 14px; }
    th { background: #f5f5f5; }
    .err { color: #c00; }
    .status { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
<h1>SQL.js — real SQLite, in-browser</h1>
<p class="status" id="status">Loading WASM…</p>
<textarea id="sql" spellcheck="false">SELECT name, role, salary FROM staff ORDER BY salary DESC;</textarea>
<button id="run" disabled>Run query</button>
<div id="out"></div>

<script>
const status = document.getElementById('status');
const out = document.getElementById('out');
let db;

initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1/dist/${f}` }).then(SQL => {
  db = new SQL.Database();
  db.run(`
    CREATE TABLE staff (name TEXT, role TEXT, salary INTEGER);
    INSERT INTO staff VALUES
      ('Ada', 'Engineer', 145000),
      ('Bob', 'Designer', 120000),
      ('Cleo', 'PM', 130000),
      ('Dana', 'Engineer', 150000);
  `);
  status.textContent = 'SQLite ready — full SQL engine compiled to WASM, no server.';
  document.getElementById('run').disabled = false;
  runQuery();
});

function runQuery() {
  const sql = document.getElementById('sql').value;
  try {
    const res = db.exec(sql);
    if (!res.length) { out.innerHTML = '<p class="status">No rows.</p>'; return; }
    const { columns, values } = res[0];
    let html = '<table><thead><tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    html += values.map(row => '<tr>' + row.map(v => `<td>${v}</td>`).join('') + '</tr>').join('');
    html += '</tbody></table>';
    out.innerHTML = html;
  } catch (e) {
    out.innerHTML = `<p class="err">${e.message}</p>`;
  }
}
document.getElementById('run').onclick = runQuery;
</script>
</body>
</html>
