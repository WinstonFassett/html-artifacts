<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hyperframes — composition gallery</title>
<style>
  :root { --bg:#0b0b12; --panel:#14141f; --line:#23233a; --txt:#e7e7f0; --dim:#9a9ab0; --accent:#6c7cff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--txt);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; }
  body { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
  aside { border-right: 1px solid var(--line); overflow-y: auto; background: var(--panel); }
  header { padding: 16px 18px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 2; }
  header h1 { margin: 0 0 4px; font-size: 16px; }
  header p { margin: 0; color: var(--dim); font-size: 12px; }
  .search { width: 100%; margin-top: 10px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: #0e0e18; color: var(--txt); }
  .group { padding: 10px 0 2px; }
  .group > .label { padding: 6px 18px; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .item { padding: 12px 18px; cursor: pointer; border-left: 3px solid transparent; display: flex; justify-content: space-between; gap: 8px; }
  .item:hover { background: #1c1c2c; }
  .item.active { background: #1c1c2c; border-left-color: var(--accent); }
  .item .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .du { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 12px; flex-shrink: 0; }
  .hf-badge { font-size: 9px; text-transform: uppercase; letter-spacing: .04em; padding: 1px 5px; margin-left: 6px;
    border-radius: 6px; background: #3a3a52; color: #b9b9d6; vertical-align: middle; }
  main { display: flex; flex-direction: column; min-width: 0; }
  .bar { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
  .bar .id { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar .meta { color: var(--dim); font-size: 12px; flex-shrink: 0; }
  .bar a { margin-left: auto; color: var(--accent); text-decoration: none; font-size: 13px; flex-shrink: 0; }
  iframe { flex: 1; border: 0; width: 100%; background: #000; }
  .empty { margin: auto; color: var(--dim); }

  /* Mobile hamburger button — hidden on desktop */
  .mob-toggle { display: none; }

  /* Mobile backdrop */
  #backdrop { display: none; position: fixed; inset: 0; z-index: 9; background: rgba(0,0,0,.6); }

  @media (max-width: 767px) {
    body { grid-template-columns: 1fr; }

    aside {
      position: fixed;
      inset-block: 0;
      left: 0;
      z-index: 10;
      width: min(320px, 85vw);
      transform: translateX(-100%);
      transition: transform .2s ease;
      border-right: 1px solid var(--line);
    }
    aside.open { transform: translateX(0); }
    #backdrop.open { display: block; }

    .mob-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border: none;
      background: none;
      color: var(--dim);
      cursor: pointer;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1;
    }
    .mob-toggle:hover { background: #1c1c2c; color: var(--txt); }

    .bar { gap: 8px; }
    .bar .meta { display: none; }

    /* Thumb-friendly items on mobile */
    .item { padding: 14px 18px; }
  }
</style>
</head>
<body>
<div id="backdrop"></div>
<aside id="sidebar">
  <header>
    <h1>Hyperframes Gallery</h1>
    <p><span id="count">0</span> standalone compositions · play &amp; scrub any</p>
    <input class="search" id="search" placeholder="Filter…" autocomplete="off">
  </header>
  <div id="list"></div>
</aside>
<main>
  <div class="bar">
    <button class="mob-toggle" id="mob-toggle" aria-label="Open composition list">☰</button>
    <span class="id" id="curId">Select a composition</span>
    <span class="meta" id="curMeta"></span>
    <a id="openRaw" href="#" target="_blank" rel="noopener">open ↗</a>
  </div>
  <iframe id="stage" title="composition"></iframe>
</main>
<script>
(async function () {
  const manifest = await fetch("manifest.json").then(r => r.json());
  const byProject = {};
  manifest.forEach(m => (byProject[m.project] ||= []).push(m));
  document.getElementById("count").textContent = manifest.length;

  const list = document.getElementById("list");
  const stage = document.getElementById("stage");
  const curId = document.getElementById("curId");
  const curMeta = document.getElementById("curMeta");
  const openRaw = document.getElementById("openRaw");
  const sidebar = document.getElementById("sidebar");
  const backdrop = document.getElementById("backdrop");
  const mobToggle = document.getElementById("mob-toggle");
  let activeEl = null;

  function openSidebar() {
    sidebar.classList.add("open");
    backdrop.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeSidebar() {
    sidebar.classList.remove("open");
    backdrop.classList.remove("open");
    document.body.style.overflow = "";
  }
  mobToggle.addEventListener("click", openSidebar);
  backdrop.addEventListener("click", closeSidebar);

  function select(m, el) {
    if (activeEl) activeEl.classList.remove("active");
    activeEl = el; el && el.classList.add("active");
    stage.src = m.file + "?autoplay=1&loop=1";
    curId.textContent = m.id;
    curMeta.textContent = `${m.project} · ${m.duration || "?"}s${m.template ? " · template" : ""}${m.note ? " · " + m.note : ""}`;
    openRaw.href = m.file;
    location.hash = m.file;
    // Close sidebar on mobile after selection
    if (window.innerWidth < 768) closeSidebar();
  }

  function render(filter = "") {
    list.innerHTML = "";
    const f = filter.toLowerCase();
    Object.keys(byProject).sort().forEach(proj => {
      const items = byProject[proj].filter(m =>
        !f || m.id.toLowerCase().includes(f) || m.project.toLowerCase().includes(f) || m.name.toLowerCase().includes(f));
      if (!items.length) return;
      const g = document.createElement("div"); g.className = "group";
      g.innerHTML = `<div class="label">${proj}</div>`;
      items.forEach(m => {
        const el = document.createElement("div"); el.className = "item";
        const noted = !!m.status || !!m.note;
        const dur = `${m.duration || "?"}s`;
        const badge = m.status ? ` <span class="hf-badge">${m.status}</span>` : "";
        el.innerHTML = `<span class="nm">${m.name}${badge}</span><span class="du" ${noted ? `title="${(m.note || m.status).replace(/"/g,"&quot;")}" style="opacity:.55"` : ""}>${dur}</span>`;
        el.onclick = () => select(m, el);
        if (location.hash.slice(1) === m.file) setTimeout(() => select(m, el), 0);
        g.appendChild(el);
      });
      list.appendChild(g);
    });
  }
  document.getElementById("search").oninput = e => render(e.target.value);
  render();

  // Default to flex-css if no hash is set
  if (!location.hash) {
    const flexEntry = manifest.find(m => m.id === "flex-css");
    if (flexEntry) {
      list.querySelectorAll(".item").forEach(item => {
        if (item.querySelector(".nm")?.textContent.trim().startsWith("flex-css")) {
          select(flexEntry, item);
        }
      });
    }
  }
})();
</script>
</body>
</html>
