<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D3 force graph starter</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    svg { display: block; width: 100vw; height: 100vh; }
    .link { stroke: #999; stroke-opacity: 0.6; }
    .node { stroke: #fff; stroke-width: 1.5px; cursor: grab; }
  </style>
</head>
<body>
<svg id="graph"></svg>

<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';

const nodes = [
  { id: 'core' }, { id: 'ui' }, { id: 'api' }, { id: 'db' },
  { id: 'auth' }, { id: 'cache' }, { id: 'queue' }, { id: 'worker' },
];
const links = [
  { source: 'ui', target: 'core' }, { source: 'core', target: 'api' },
  { source: 'api', target: 'db' }, { source: 'api', target: 'auth' },
  { source: 'api', target: 'cache' }, { source: 'core', target: 'queue' },
  { source: 'queue', target: 'worker' }, { source: 'worker', target: 'db' },
];

const svg = d3.select('#graph');
const w = window.innerWidth, h = window.innerHeight;
const color = d3.scaleOrdinal(d3.schemeCategory10);

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(80))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(w / 2, h / 2))
  .force('collide', d3.forceCollide(28));

const link = svg.append('g').selectAll('line').data(links).join('line').attr('class', 'link');
const node = svg.append('g').selectAll('g').data(nodes).join('g').call(drag(sim));
node.append('circle').attr('class', 'node').attr('r', 18).attr('fill', (d, i) => color(i));
node.append('text').text(d => d.id).attr('text-anchor', 'middle').attr('dy', 4).attr('font-size', 10).attr('fill', '#fff');

sim.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}
</script>
</body>
</html>
