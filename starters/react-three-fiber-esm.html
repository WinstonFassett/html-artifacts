<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Three Fiber — declarative 3D in React, no build</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "three": "https://esm.sh/three@0.170",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@9?external=react,react-dom,three"
    }
  }
  </script>
  <script type="module" src="https://esm.sh/tsx"></script>
  <style>
    body { margin: 0; height: 100vh; background: #0c0c14; }
    #root, canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/tsx">
import { createRoot } from 'react-dom/client'
import { Canvas, useFrame } from '@react-three/fiber'
import { useRef, useState } from 'react'

function Box(props: any) {
  const mesh = useRef<any>(null)
  const [hovered, setHover] = useState(false)
  const [active, setActive] = useState(false)
  useFrame((_, delta) => {
    if (mesh.current) { mesh.current.rotation.x += delta * 0.6; mesh.current.rotation.y += delta * 0.8 }
  })
  return (
    <mesh
      {...props}
      ref={mesh}
      scale={active ? 1.6 : 1}
      onClick={() => setActive(!active)}
      onPointerOver={() => setHover(true)}
      onPointerOut={() => setHover(false)}>
      <boxGeometry args={[1.4, 1.4, 1.4]} />
      <meshStandardMaterial color={hovered ? '#f472b6' : '#4ade80'} roughness={0.3} metalness={0.4} />
    </mesh>
  )
}

function Scene() {
  return (
    <Canvas camera={{ position: [0, 0, 4] }}>
      <ambientLight intensity={0.4} />
      <directionalLight position={[3, 5, 4]} intensity={1.2} />
      <Box position={[-1.2, 0, 0]} />
      <Box position={[1.2, 0, 0]} />
    </Canvas>
  )
}

createRoot(document.getElementById('root')!).render(<Scene />)
</script>
</body>
</html>
