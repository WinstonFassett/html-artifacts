<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collaborative Milkdown — Yjs + Trystero P2P + IndexedDB, no build</title>
  <link rel="stylesheet" href="https://esm.sh/@milkdown/crepe@7/theme/common/style.css">
  <link rel="stylesheet" href="https://esm.sh/@milkdown/crepe@7/theme/frame.css">
  <!-- Import map so esm.sh's ?external=yjs specifiers resolve to one shared Yjs
       instance (multiple Yjs copies break CRDT identity). -->
  <script type="importmap">
  {
    "imports": {
      "yjs": "https://esm.sh/yjs@13",
      "y-protocols/awareness": "https://esm.sh/y-protocols@1/awareness?external=yjs"
    }
  }
  </script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    header { padding: 0.5rem 1rem; background: #1a1a22; color: #ddd; display: flex; gap: 1rem; align-items: center; font-size: 0.85rem; }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: #888; }
    header .dot.on { background: #4ade80; }
    /* Crepe defaults are loud — big headings + heavy outer padding. Tone it down. */
    .milkdown { max-width: 740px; margin: 0 auto; }
    .milkdown .ProseMirror { padding: 1rem 0.5rem !important; }
    .milkdown .ProseMirror h1 { font-size: 1.5rem; margin: 0.6em 0 0.3em; }
    .milkdown .ProseMirror h2 { font-size: 1.25rem; }
    .milkdown .ProseMirror h3 { font-size: 1.1rem; }
    .milkdown .ProseMirror p { margin: 0.5em 0; line-height: 1.55; }
  </style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <span id="status">starting…</span>
  <span style="margin-left:auto; color:#888">
    Open this same URL in another tab/device — edits sync P2P. Persists to IndexedDB.
  </span>
</header>
<div id="app"></div>

<!--
  The missing single-file Yjs piece: a RICH editor that loads via ESM.
  Stack (all from esm.sh, no build):
    - yjs                       CRDT document
    - y-indexeddb               local-first persistence
    - y-trystero                P2P sync (WebRTC via public torrent/nostr trackers — no server)
    - @milkdown/crepe           batteries-included markdown WYSIWYG
    - @milkdown/plugin-collab   binds Milkdown's ProseMirror state to the Yjs doc
  Distilled from winstonfassett/y-labs (minus its nanostores/React app layer).
-->
<script type="module">
import * as Y from 'yjs';
import { IndexeddbPersistence } from 'https://esm.sh/y-indexeddb@9?external=yjs';
import { TrysteroProvider } from 'https://esm.sh/y-trystero@0.0.5?external=yjs';
import { Awareness } from 'y-protocols/awareness';
import { Crepe } from 'https://esm.sh/@milkdown/crepe@7';
import { collab, collabServiceCtx } from 'https://esm.sh/@milkdown/plugin-collab@7?external=@milkdown/kit,yjs';

const status = document.getElementById('status');
const dot = document.getElementById('dot');
const setStatus = (t) => status.textContent = t;

// Room = the part after #, so you can have multiple rooms. Default 'demo'.
const room = location.hash.slice(1) || 'demo-room';

// 1. Yjs doc + local persistence
const ydoc = new Y.Doc();
const idb = new IndexeddbPersistence(`milkdown-${room}`, ydoc);

// 2. P2P sync via Trystero (torrent strategy = public trackers, no server to run)
const awareness = new Awareness(ydoc);
const provider = new TrysteroProvider(ydoc, room, { appId: 'html-artifacts-milkdown' }, { awareness });
provider.on('synced', () => setStatus(`synced · room: ${room}`));
provider.on('peers', ({ added, removed }) => {
  const n = provider.room ? Object.keys(provider.awareness.getStates()).length - 1 : 0;
  dot.classList.toggle('on', n > 0);
  setStatus(`${n} peer${n===1?'':'s'} connected · room: ${room}`);
});

// 3. Milkdown Crepe + collab plugin, bound to the Yjs doc
await idb.whenSynced;
const crepe = new Crepe({
  root: '#app',
  defaultValue: '# Collaborative doc\n\nStart typing — edits sync to peers and persist locally.\n',
  // CodeMirror + Latex features pull deps that don't resolve cleanly via esm.sh; disable them.
  features: {
    [Crepe.Feature.CodeMirror]: false,
    [Crepe.Feature.Latex]: false,
  },
});
crepe.editor.use(collab);
await crepe.create();

crepe.editor.action((ctx) => {
  const collabService = ctx.get(collabServiceCtx);
  collabService.bindDoc(ydoc).setAwareness(awareness).connect();
});

setStatus(`ready · room: ${room} (share this URL)`);
</script>
</body>
</html>
