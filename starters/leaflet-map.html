<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet map — no build</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.js"></script>
  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([37.7749, -122.4194], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

const points = [
  { name: 'Golden Gate Bridge', ll: [37.8199, -122.4783] },
  { name: 'Ferry Building', ll: [37.7955, -122.3937] },
  { name: 'Twin Peaks', ll: [37.7544, -122.4477] },
];
points.forEach(p => L.marker(p.ll).addTo(map).bindPopup(p.name));
</script>
</body>
</html>
