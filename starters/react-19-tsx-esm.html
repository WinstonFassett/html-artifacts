<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React 19 TSX starter</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react/": "https://esm.sh/react@19/",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/": "https://esm.sh/react-dom@19/",
      "react-dom/client": "https://esm.sh/react-dom@19/client"
    }
  }
  </script>
  <!-- esm.sh/tsx finds <script type="text/tsx"> blocks and runs them as modules.
       MUST be type="module" — the loader uses import.meta.url internally. -->
  <script type="module" src="https://esm.sh/tsx"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #root { padding: 1rem; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/tsx">
import { useState } from 'react'
import { createRoot } from 'react-dom/client'

function App() {
  const [count, setCount] = useState(0)
  return (
    <div style={{ padding: '2rem', fontFamily: 'system-ui' }}>
      <h1>React 19 TSX — no build</h1>
      <p>esm.sh/tsx handles JSX. Import map resolves react@19. Any bare import → esm.sh.</p>
      <button onClick={() => setCount(c => c + 1)}>count: {count}</button>
    </div>
  )
}

createRoot(document.getElementById('root')!).render(<App />)
</script>
</body>
</html>
