<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP motion — timeline</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <style>
    body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; background: #0c0c14; font-family: system-ui, sans-serif; color: #ddd; overflow: hidden; }
    .stage { position: relative; width: 360px; height: 200px; }
    .box { position: absolute; width: 60px; height: 60px; border-radius: 12px; }
    .b1 { background: #4ade80; }
    .b2 { background: #60a5fa; }
    .b3 { background: #f472b6; }
    button { background: #222; color: #ddd; border: 1px solid #444; padding: 0.5rem 1.2rem; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<div class="stage">
  <div class="box b1" style="top:0;left:0"></div>
  <div class="box b2" style="top:70px;left:0"></div>
  <div class="box b3" style="top:140px;left:0"></div>
</div>
<button id="replay">Replay timeline</button>

<script>
function build() {
  const tl = gsap.timeline();
  tl.to('.b1', { x: 300, rotation: 360, duration: 1, ease: 'power2.inOut' })
    .to('.b2', { x: 300, rotation: -360, duration: 1, ease: 'back.inOut(1.7)' }, '-=0.7')
    .to('.b3', { x: 300, rotation: 720, duration: 1, ease: 'elastic.out(1, 0.4)' }, '-=0.7')
    .to('.box', { scale: 1.3, stagger: 0.1, yoyo: true, repeat: 1, duration: 0.3 });
  return tl;
}
let tl = build();
document.getElementById('replay').onclick = () => { gsap.set('.box', { x: 0, rotation: 0, scale: 1 }); tl = build(); };
</script>
</body>
</html>
