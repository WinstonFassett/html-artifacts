<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Matchina + Solid</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400;1,500&display=swap"><link rel="stylesheet" href="demo.css"></head> <body> <main class="container"> <p class="eyebrow">Matchina В· CDN demo В· Solid</p> <h1>Fine-grained reactivity with <em>Solid</em></h1> <p class="subtitle">matchina@0.3.0-alpha.0 + solid-js@1.9 (html + web) В· fine-grained reactivity, no JSX build</p> <div class="grid">  <article class="card" id="tl-card"></article> <article class="card" id="cnt-card"></article>   </div> </main> <script type="module">const matchinaUrl = "https://esm.sh/matchina@0.3.0-alpha.0?bundle&exports=matchina,createStore,defineStates,storeApi";
const solidUrl = "https://esm.sh/solid-js@1.9.3";
const solidWebUrl = "https://esm.sh/solid-js@1.9.3/web";
const solidHtmlUrl = "https://esm.sh/solid-js@1.9.3/html";

        const { matchina, defineStates, createStore, storeApi } = await import(matchinaUrl);
        const { createSignal } = await import(solidUrl);
        const { render } = await import(solidWebUrl);
        const { default: html } = await import(solidHtmlUrl);

        // в”Ђв”Ђ Integration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        // Solid signals are [get, set] tuples backed by fine-grained
        // tracking. Mirror matchina's state into a signal in `subscribe`
        // вЂ” Solid only re-runs the exact expressions that read the
        // getter, not whole components. matchina's notify-phase
        // subscribe pairs cleanly with this granularity.
        const useMatchina = (m) => {
            const [get, set] = createSignal(m.getState());
            m.subscribe(() => set(() => m.getState()));
            return get;
        };
        // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

        // Traffic light
        const trafficStates = defineStates({ Red: undefined, Yellow: undefined, Green: undefined });
        const traffic = matchina(
            trafficStates,
            {
                Red:    { next: 'Green',  reset: 'Red' },
                Green:  { next: 'Yellow', reset: 'Red' },
                Yellow: { next: 'Red',    reset: 'Red' },
            },
            'Red'
        );
        const tlState = useMatchina(traffic);
        const [tlLog, setTlLog] = createSignal('waitingвЂ¦');
        traffic.subscribe(ev => setTlLog(`${ev.from.key} в†’ ${ev.to.key}`));

        const TrafficCard = () => html`
            <div class="card-eyebrow"><span>fig.01 вЂ” Traffic light</span><span class="meta">matchina + solid</span></div>
            <div class="card-stage">
                <div class="traffic">
                    <div class=${() => `light ${tlState().key === 'Red' ? 'red' : ''}`}></div>
                    <div class=${() => `light ${tlState().key === 'Yellow' ? 'yellow' : ''}`}></div>
                    <div class=${() => `light ${tlState().key === 'Green' ? 'green' : ''}`}></div>
                </div>
            </div>
            <p class="state-line">state <code>${() => tlState().key}</code></p>
            <div class="row">
                <button onClick=${() => traffic.next()}>Next в†’</button>
                <button class="secondary" onClick=${() => traffic.reset()}>Reset</button>
            </div>
            <footer><span class="log">${tlLog}</span></footer>
        `;
        render(TrafficCard, document.getElementById('tl-card'));

        // Counter
        const counter = createStore(0, {
            increment: (amt = 1) => (ch) => ch.from + amt,
            decrement: (amt = 1) => (ch) => ch.from - amt,
            set: (value) => value,
            reset: () => 0,
        });
        const api = storeApi(counter);
        const cnt = useMatchina(counter);
        const [cntLog, setCntLog] = createSignal('waitingвЂ¦');
        counter.subscribe(ev => setCntLog(`${ev.from} в†’ ${ev.to}`));

        const CounterCard = () => html`
            <div class="card-eyebrow"><span>fig.02 вЂ” Counter store</span><span class="meta">createStore + solid</span></div>
            <div class="card-stage"><p class="count">${cnt}</p></div>
            <div class="row">
                <button class="secondary" onClick=${() => api.decrement(5)}>в€’5</button>
                <button class="secondary" onClick=${() => api.decrement()}>в€’1</button>
                <button onClick=${() => api.increment()}>+1</button>
                <button onClick=${() => api.increment(5)}>+5</button>
            </div>
            <div class="row">
                <button class="outline" onClick=${() => api.set(100)}>Set 100</button>
                <button class="outline" onClick=${() => api.reset()}>Reset</button>
            </div>
            <footer><span class="log">${cntLog}</span></footer>
        `;
        render(CounterCard, document.getElementById('cnt-card'));

        window.traffic = traffic;
        window.counter = counter;
    </script> </body></html>
